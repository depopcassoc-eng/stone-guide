<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>石図鑑 -- パワーストーンプロフィール</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Noto+Sans+JP:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
<style>
:root{
  --bg: #14161b;
  --bg-elev: #1b1e25;
  --card: #1f232b;
  --card-hover: #262b34;
  --line: #33394450;
  --text: #eae7e0;
  --text-dim: #a3a19a;
  --text-faint: #6f6e69;
  --gold: #c9a15a;

  --c-white:#f2efe6; --c-white-ink:#2a2823;
  --c-purple:#a487c9; --c-purple-ink:#2a2138;
  --c-blue:#5f9ed1; --c-blue-ink:#122334;
  --c-green:#6bab84; --c-green-ink:#132a1e;
  --c-yellow:#d9a53f; --c-yellow-ink:#332508;
  --c-black:#a08a72; --c-black-ink:#221c15;
  --c-red:#cf6f8e; --c-red-ink:#341522;
  --c-silver:#9ea6ae; --c-silver-ink:#1c2024;
  --c-multi:#c98fbf; --c-multi-ink:#2a1c2a;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;-webkit-font-smoothing:antialiased;}
body{min-height:100vh;}
::selection{background:var(--gold);color:#14161b;}

.site-header{
  position:sticky; top:0; z-index:40;
  background:linear-gradient(180deg, rgba(20,22,27,0.98), rgba(20,22,27,0.94));
  backdrop-filter: blur(10px);
  border-bottom:1px solid var(--line);
  padding:12px 20px;
}
.header-inner{max-width:1080px; margin:0 auto;}
.brand{display:flex; align-items:baseline; gap:9px;}
.brand-mark{width:20px;height:20px; flex-shrink:0;}
.brand h1{
  font-family:'Shippori Mincho', serif; font-weight:700; font-size:17px;
  letter-spacing:0.06em; margin:0; color:var(--text);
}
.brand .sub{font-size:10px; color:var(--text-faint); letter-spacing:0.13em; font-family:'Cormorant Garamond', serif; font-style:italic; margin-left:2px; display:none;}

.tab-row{display:flex; gap:6px; margin-top:12px;}
.tab-btn{
  background:none; border:1px solid var(--line); color:var(--text-dim);
  font-family:'Noto Sans JP',sans-serif; font-size:13px; padding:7px 16px; border-radius:100px;
  cursor:pointer; transition:all .15s;
}
.tab-btn:hover{border-color:var(--text-faint);}
.tab-btn.active{background:var(--gold); border-color:var(--gold); color:#1a1408; font-weight:600;}

.search-row{display:flex; gap:8px; margin-top:10px;}
.search-box{flex:1; position:relative;}
.search-box input{
  width:100%; background:var(--bg-elev); border:1px solid var(--line); border-radius:10px;
  padding:11px 14px 11px 38px; color:var(--text); font-size:15px; font-family:'Noto Sans JP',sans-serif;
  outline:none; transition:border-color .15s;
}
.search-box input:focus{border-color:var(--gold);}
.search-box input::placeholder{color:var(--text-faint);}
.search-icon{
  position:absolute; left:12px; top:50%; transform:translateY(-50%);
  width:16px; height:16px; color:var(--text-faint); pointer-events:none;
}
.count-pill{
  display:flex; align-items:center; padding:0 14px; border:1px solid var(--line); border-radius:10px;
  color:var(--text-dim); font-size:12px; white-space:nowrap; background:var(--bg-elev);
  font-variant-numeric: tabular-nums;
}

/* Filters: normal (non-sticky) block that sits at the top of the page and
   naturally scrolls away under the sticky header -- no JS animation, no flicker. */
.filters{
  max-width:1080px; margin:16px auto 4px; padding:0 20px 18px;
  border-bottom:1px solid var(--line);
}
.filter-toggle{
  display:flex; align-items:center; gap:5px; margin-left:auto; flex-shrink:0;
  background:var(--bg-elev); border:1px solid var(--line); border-radius:10px;
  padding:0 12px; color:var(--text-dim); font-size:12px; cursor:pointer; white-space:nowrap;
}
.filter-toggle:hover{border-color:var(--gold); color:var(--gold);}
.filter-toggle svg{width:13px; height:13px;}
.filter-group{margin-bottom:16px;}
.filter-group:last-child{margin-bottom:0;}
.filter-label{font-size:10px; letter-spacing:0.15em; color:var(--text-faint); margin-bottom:8px; text-transform:uppercase;}

.color-btn-row{display:flex; gap:9px; flex-wrap:wrap;}
.color-btn{
  display:flex; flex-direction:column; align-items:center; gap:6px; cursor:pointer; user-select:none;
  border:none; background:none; padding:2px; width:58px;
}
.color-btn .swatch-big{
  width:42px; height:42px; border-radius:50%; border:2px solid transparent;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.25), inset 0 -2px 3px rgba(255,255,255,0.15);
  transition: transform .15s, border-color .15s, box-shadow .15s;
  position:relative;
}
.color-btn .swatch-big::after{
  content:''; position:absolute; inset:0; border-radius:50%;
  background:radial-gradient(circle at 32% 28%, rgba(255,255,255,0.55), transparent 55%);
}
.color-btn:hover .swatch-big{transform:translateY(-2px);}
.color-btn.active .swatch-big{border-color:var(--gold); box-shadow: 0 0 0 3px #c9a15a30, inset 0 2px 4px rgba(0,0,0,0.25);}
.color-btn .label{font-size:10.5px; color:var(--text-faint); text-align:center; line-height:1.3; transition:color .15s;}
.color-btn.active .label{color:var(--gold); font-weight:600;}
.color-btn.all .swatch-big{
  background: conic-gradient(from 0deg, #f2efe6, #a487c9, #5f9ed1, #6bab84, #d9a53f, #a08a72, #cf6f8e, #9ea6ae, #c98fbf, #f2efe6);
}

.chip-row{display:flex; gap:7px; flex-wrap:wrap;}
.chip{
  border:1px solid var(--line); background:var(--bg-elev); color:var(--text-dim);
  padding:6px 13px; border-radius:100px; font-size:12.5px; cursor:pointer; user-select:none;
  transition:all .15s; display:flex; align-items:center; gap:6px;
  font-family:'Noto Sans JP',sans-serif;
}
.chip:hover{border-color:var(--text-faint);}
.chip.active{background:var(--gold); border-color:var(--gold); color:#1a1408; font-weight:600;}
.chip .swatch{width:9px; height:9px; border-radius:50%; flex-shrink:0;}

main{max-width:1080px; margin:0 auto; padding:22px 20px 80px;}

.result-summary{font-size:12px; color:var(--text-faint); margin-bottom:14px; letter-spacing:0.02em;}
.result-summary b{color:var(--gold); font-weight:600;}

.grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(240px,1fr)); gap:12px;}

.card{
  background:var(--card); border:1px solid var(--line); border-radius:12px;
  padding:16px 16px 14px; cursor:pointer; transition:transform .15s, border-color .15s, background .15s;
  position:relative; overflow:hidden;
}
.card:hover{background:var(--card-hover); border-color:#454c58; transform:translateY(-2px);}
.card .tag-bar{position:absolute; top:0; left:0; right:0; height:3px;}
.card .name-row{display:flex; justify-content:space-between; align-items:flex-start; gap:8px; margin-bottom:5px;}
.card h3{font-family:'Shippori Mincho',serif; font-size:16.5px; font-weight:700; margin:0; color:var(--text); line-height:1.4;}
.card .en{font-size:9.5px; color:var(--text-faint); font-family:'Cormorant Garamond',serif; font-style:italic; letter-spacing:0.03em;}
.card .catch{font-size:12px; color:var(--text-dim); margin:6px 0 10px; line-height:1.55;}
.card .keywords{display:flex; flex-wrap:wrap; gap:5px;}
.card .kw{font-size:10px; padding:2px 8px; border-radius:100px; background:#ffffff08; color:var(--text-faint); border:1px solid #ffffff10;}

.empty-state{text-align:center; padding:60px 20px; color:var(--text-faint);}
.empty-state .big{font-family:'Shippori Mincho',serif; font-size:18px; color:var(--text-dim); margin-bottom:8px;}

/* Combinations tab */
.combo-list{display:flex; flex-direction:column; gap:0;}
.combo-group-header{
  font-family:'Shippori Mincho',serif; font-size:15px; color:var(--gold);
  margin:28px 0 12px; padding-bottom:8px; border-bottom:1px solid var(--line);
  display:flex; align-items:baseline; gap:10px;
}
.combo-group-header:first-child{margin-top:4px;}
.combo-group-header .cat-tag{
  font-family:'Noto Sans JP',sans-serif; font-size:10px; letter-spacing:0.08em;
  color:var(--text-faint); background:#ffffff08; padding:3px 9px; border-radius:100px; border:1px solid var(--line);
}
.combo-card{
  background:var(--card); border:1px solid var(--line); border-radius:12px;
  padding:16px 18px; margin-bottom:10px;
}
.combo-card .pattern-num{
  font-family:'Cormorant Garamond',serif; font-style:italic; font-size:11px; color:var(--text-faint); margin-bottom:6px;
}
.combo-stones{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px;}
.combo-stone-chip{
  display:inline-flex; align-items:center; gap:6px; font-size:12.5px; padding:5px 12px 5px 8px;
  border-radius:100px; border:1px solid var(--line); background:#ffffff06; color:var(--text);
  cursor:pointer; transition:border-color .15s, background .15s;
}
.combo-stone-chip:hover{border-color:var(--gold); background:#ffffff0f;}
.combo-stone-chip .dot{width:8px; height:8px; border-radius:50%; flex-shrink:0;}
.combo-stone-chip.plain{cursor:default; opacity:0.7;}
.combo-card .plus{color:var(--text-faint); font-size:12px; margin:0 1px;}
.combo-title{font-family:'Shippori Mincho',serif; font-size:15.5px; color:var(--text); margin-bottom:8px; line-height:1.5;}
.combo-desc{font-size:13.5px; line-height:1.85; color:#c9c6bd;}

/* Modal */
.overlay{
  position:fixed; inset:0; background:rgba(10,11,14,0.72); backdrop-filter:blur(3px);
  z-index:100; display:none; align-items:flex-start; justify-content:center;
  padding:0; overflow-y:auto;
}
.overlay.open{display:flex;}
.detail{
  background:var(--bg-elev); width:100%; max-width:620px; min-height:100vh;
  border-left:1px solid var(--line);
  animation: slideIn .25s ease;
}
@media (min-width:700px){
  .detail{ min-height:auto; margin:32px auto 60px; border-radius:16px; border:1px solid var(--line); }
}
@keyframes slideIn{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }

.detail-hero{padding:26px 26px 20px; position:relative;}
.detail-close{
  position:absolute; top:18px; right:18px; width:34px; height:34px; border-radius:50%;
  background:#ffffff10; border:1px solid var(--line); color:var(--text-dim);
  display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:16px;
}
.detail-close:hover{background:#ffffff1c;}
.detail-eyebrow{font-size:11px; letter-spacing:0.15em; text-transform:uppercase; margin-bottom:10px; display:flex; align-items:center; gap:8px;}
.detail-eyebrow .dot{width:8px; height:8px; border-radius:50%;}
.detail h2{font-family:'Shippori Mincho',serif; font-size:28px; margin:0 0 4px; line-height:1.3; padding-right:40px;}
.detail .en-name{font-family:'Cormorant Garamond',serif; font-style:italic; font-size:14px; color:var(--text-faint);}
.detail .wamei{font-size:12.5px; color:var(--text-dim); margin-top:2px;}
.detail .catch-line{font-size:15px; color:var(--gold); margin-top:14px; font-weight:500; line-height:1.6;}

.detail-body{padding:0 26px 30px;}
.section-title{
  font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-faint);
  margin:26px 0 10px; display:flex; align-items:center; gap:8px;
}
.section-title::after{content:''; flex:1; height:1px; background:var(--line);}
.section-text{font-size:14.5px; line-height:1.9; color:#d8d5cd;}

.data-table{width:100%; border-collapse:collapse; font-size:13px;}
.data-table tr{border-bottom:1px solid #ffffff0c;}
.data-table tr:last-child{border-bottom:none;}
.data-table td{padding:8px 0; vertical-align:top;}
.data-table td:first-child{color:var(--text-faint); width:96px; white-space:nowrap; padding-right:12px;}
.data-table td:last-child{color:#d8d5cd;}

.energy-list{display:flex; flex-direction:column; gap:8px;}
.energy-item{display:flex; align-items:flex-start; gap:10px; font-size:14px; color:#d8d5cd;}
.energy-item .bullet{width:5px; height:5px; border-radius:50%; margin-top:8px; flex-shrink:0;}

.kw-row{display:flex; flex-wrap:wrap; gap:6px;}
.kw-pill{font-size:12px; padding:5px 12px; border-radius:100px; border:1px solid var(--line); color:var(--text-dim);}

.caution-box{
  margin-top:22px; padding:12px 14px; border-radius:10px; background:#3a231e40; border:1px solid #6b3a2e60;
  font-size:12.5px; color:#e0b3a2; line-height:1.6;
}
.caution-box b{color:#f0c9bc;}

.empty-field{color:var(--text-faint); font-style:italic;}

.related-combo-item{
  border:1px solid var(--line); border-radius:10px; padding:12px 14px; margin-bottom:8px; background:#ffffff05;
}
.related-combo-item .wish{font-size:10.5px; color:var(--text-faint); margin-bottom:5px;}
.related-combo-item .title{font-size:13.5px; color:var(--text); margin-bottom:7px; line-height:1.5;}
.related-combo-item .partners{display:flex; flex-wrap:wrap; gap:5px;}
.related-combo-item .partner-chip{
  font-size:11.5px; padding:4px 10px; border-radius:100px; border:1px solid var(--line); color:var(--text-dim);
  cursor:pointer; background:#ffffff08;
}
.related-combo-item .partner-chip:hover{border-color:var(--gold); color:var(--gold);}

footer{max-width:1080px; margin:0 auto; padding:20px 20px 40px; text-align:center; color:var(--text-faint); font-size:11px;}

@media (max-width:480px){
  .brand h1{font-size:19px;}
  .grid{grid-template-columns:1fr 1fr;}
  .card h3{font-size:14.5px;}
  .detail h2{font-size:23px;}
  .color-btn{width:50px;}
  .color-btn .swatch-big{width:36px; height:36px;}
  .color-btn .label{font-size:9.5px;}
}
</style>
</head>
<body>

<header class="site-header" id="siteHeader">
  <div class="header-inner">
    <div class="brand">
      <svg class="brand-mark" viewBox="0 0 24 24" fill="none">
        <path d="M12 2 L20 9 L16 21 L8 21 L4 9 Z" stroke="#c9a15a" stroke-width="1.3" fill="none" stroke-linejoin="round"/>
        <path d="M12 2 L12 21 M4 9 L20 9 M8 21 L12 2 L16 21" stroke="#c9a15a" stroke-width="0.6" opacity="0.6"/>
      </svg>
      <h1>石図鑑</h1>
      <span class="sub">Power Stone Profiles</span>
    </div>
    <div class="tab-row">
      <button class="tab-btn active" id="tabStones" data-tab="stones">石一覧</button>
      <button class="tab-btn" id="tabCombos" data-tab="combos">組み合わせ</button>
    </div>
    <div class="search-row">
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="searchInput" type="text" placeholder="石の名前で検索(例: ムーン、アメ、水晶)">
      </div>
      <div class="count-pill" id="countPill">172件</div>
      <div class="filter-toggle" id="filterToggle">
        絞り込みへ
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 15l-6-6-6 6"/></svg>
      </div>
    </div>
  </div>
</header>

<div class="filters" id="filtersSection">
  <div class="filter-group" id="stoneFilterGroup1">
    <div class="filter-label">色で絞り込む</div>
    <div class="color-btn-row" id="colorButtons"></div>
  </div>
  <div class="filter-group" id="stoneFilterGroup2">
    <div class="filter-label">キーワードで絞り込む</div>
    <div class="chip-row" id="keywordChips"></div>
  </div>
  <div class="filter-group" id="comboFilterGroup" style="display:none;">
    <div class="filter-label">悩み・願いのカテゴリで絞り込む</div>
    <div class="chip-row" id="categoryChips"></div>
  </div>
</div>

<main>
  <div class="result-summary" id="resultSummary"></div>
  <div class="grid" id="grid"></div>
  <div class="combo-list" id="comboList" style="display:none;"></div>
  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="big">石が見つかりませんでした</div>
    <div>検索条件を変えてお試しください</div>
  </div>
</main>

<footer>パワーストーンプロフィールデータツール ・ 解説文はオリジナル書き起こし</footer>

<div class="overlay" id="overlay">
  <div class="detail" id="detailPanel"></div>

ones":[{"id":"pink-opal","name":"ピンクオパール"},{"id":"larimar","name":"ラリマー"}],"title":"今の関係をより強く、深くする","desc":"男女どちらがつけても良い組み合わせで、お互いの心が読みやすくなり、絆を深めるためのお守りとなってくれます。"},{"id":"c021","category":"恋愛","categoryEn":"LOVE","wish":"上手く気持ちを伝えたい","pattern":1,"stones":[{"id":"milky-quartz","name":"ミルキークォーツ"},{"id":"rhodochrosite","name":"ロードクロサイト"}],"title":"緊張をほぐして自分の魅力を伝える","desc":"告白の時のお守りとして、この二つの石は思いを伝える時の緊張感はほぐし、しっかりと自分の魅力を伝える助けとなります。"},{"id":"c022","category":"恋愛","categoryEn":"LOVE","wish":"上手く気持ちを伝えたい","pattern":2,"stones":[{"id":"blue-chalcedony","name":"ブルーカルセドニ"},{"id":"moonstone","name":"ムーンストーン"}],"title":"相手の考えを読み取りやすくする","desc":"異性が考えていることを何となく読み取りやすくする組み合わせ、同時にリラックスもさせてくれるので、告白の時のお守りにも。"},{"id":"c023","category":"恋愛","categoryEn":"LOVE","wish":"恋人と仲直りがしたい","pattern":1,"stones":[{"id":"obsidian","name":"オブシディアン"},{"id":"blue-chalcedony","name":"ブルーカルセドニ"}],"title":"離れた相手との距離を再び縮める","desc":"気まずくなった恋人との関係をもう一度強くするためのお守りとなる組み合わせです。男女問わって使っていただけます。"},{"id":"c024","category":"恋愛","categoryEn":"LOVE","wish":"恋人と仲直りがしたい","pattern":2,"stones":[{"id":"obsidian","name":"オブシディアン"},{"id":"rhodochrosite","name":"ロードクロサイト"}],"title":"心の傷を癒やして関係を修復する","desc":"喧嘩等で、傷ついてしまった心や関係の修復を助けてくれる組み合わせです。男女どちらが持っても大丈夫です。"},{"id":"c025","category":"恋愛","categoryEn":"LOVE","wish":"遠距離恋愛のお守り","pattern":1,"stones":[{"id":"garnet","name":"ガーネット"},{"id":"turquoise","name":"ターコイズ"},{"id":"moonstone","name":"ムーンストーン"}],"title":"遠く離れた二人の絆を確かめる","desc":"男女共に身につけていただける組み合わせです。恋愛面以外にもインスピレーションを高める力を持っています。災厄から守ってくれます。"},{"id":"c026","category":"恋愛","categoryEn":"LOVE","wish":"一歩踏み出す勇気が欲しい","pattern":1,"stones":[{"id":"rhodochrosite","name":"ロードクロサイト"},{"id":"chrysoprase","name":"クリソプレーズ"}],"title":"気になる人との距離を縮める手助けに","desc":"恋愛、仕事に拘わらず、一歩を踏み出すための勇気をくれる組み合わせです。気になる人と接近するチャンスを作るためのお守りになってくれます。"},{"id":"c027","category":"恋愛","categoryEn":"LOVE","wish":"一歩踏み出す勇気が欲しい","pattern":2,"stones":[{"id":"rose-quartz","name":"ローズクォーツ"},{"id":"carnelian","name":"カーネリアン"}],"title":"恋に臆病な人にぴったりの組み合わせ","desc":"恋愛に対する勇気 です。そしてアマゾナイトがその組み合わせに幸運を運び、プラスしてくれます。"},{"id":"c041","category":"金運・幸運","categoryEn":"ECONOMIC FORTUNE, LUCK","wish":"家を買うときに","pattern":1,"stones":[{"id":"garnet","name":"ガーネット"},{"id":"amazonite","name":"アマゾナイト"}],"title":"大きな幸運をもたらし、負の力から守る","desc":"家を購入する時に動く大きなエネルギーに負けない強さをもたらす組み合わせです。アマゾナイトが幸運、ガーネットが生命力を象徴します。"},{"id":"c042","category":"金運・幸運","categoryEn":"ECONOMIC FORTUNE, LUCK","wish":"家を買うときに","pattern":2,"stones":[{"id":"garden-quartz","name":"ガーデンクォーツ"},{"id":"amazonite","name":"アマゾナイト"}],"title":"土地との結びつきで家選びをサポート","desc":"ガーデンクォーツは土地との結びつきが強いので、不動産関係のお仕事の方にもおすすめです。間違いのない家選びを助けてくれる組み合わせです。"},{"id":"c043","category":"金運・幸運","categoryEn":"ECONOMIC FORTUNE, LUCK","wish":"幸運体質になるためのベースストーン","pattern":1,"stones":[{"id":"amazonite","name":"アマゾナイト"},{"id":"apatite","name":"アパタイト"}],"title":"「幸運体質」を作るベースに","desc":"幸運体質になるための最高のベースストーン。さらにロードクロサイトを加えて恋愛方向へ、というように、目的に応じて石をプラスしてもOK。"},{"id":"c044","category":"金運・幸運","categoryEn":"ECONOMIC FORTUNE, LUCK","wish":"幸運体質になるためのベースストーン","pattern":2,"stones":[{"id":"amethyst","name":"アメジスト"},{"id":"citrine","name":"シトリンクォーツ"}],"title":"精神のバランスをとってくれる","desc":"循環と調和を象徴する理想の組み合わせ。特に精神と感情面のバランスを理想的にとってくれるので、良い流れをつかみやすくしてくれます。"},{"id":"c045","category":"金運・幸運","categoryEn":"ECONOMIC FORTUNE, LUCK","wish":"今の状況を好転させたい","pattern":1,"stones":[{"id":"tanzanite","name":"タンザナイト"},{"id":"labradorite","name":"ラブラドライト"}],"title":"人生の道を切り開く","desc":"人生における重大事に対して問題解決を助け、道を開くための強いお守りとなってくれる組み合わせです。"},{"id":"c046","category":"金運・幸運","categoryEn":"ECONOMIC FORTUNE, LUCK","wish":"今の状況を好転させたい","pattern":2,"stones":[{"id":"tanzanite","name":"タンザナイト"},{"id":"moldavite","name":"モルダバイト"}],"title":"前世からの問題を解決へと導く","desc":"前世から引きついだ問題や課題のクリアに強い助けとなってくれる組み合わせです。人生の一大事に対して強力なサポートとなってくれます。"},{"id":"c047","category":"仕事運","categoryEn":"BUSINESS","wish":"男性の事業家におすすめの組み合わせ","pattern":1,"stones":[{"id":"rutilated-quartz","name":"ルチルクォーツ"},{"id":"amethyst","name":"アメジスト"}],"title":"安定した力で正しい経営を実現する","desc":"魂の目的に沿った正しい経営をしようとする人に対して非常に大きな守りとなってくれる組み合わせです。ルチルクォーツが大きな力で守り、アメジストが心身の調和をとってくれる、とても安定した組み合わせです。"},{"id":"c048","category":"仕事運","categoryEn":"BUSINESS","wish":"男性の事業家におすすめの組み合わせ","pattern":2,"stones":[{"id":"rutilated-quartz","name":"ルチルクォーツ"},{"id":"amethyst","name":"アメジスト"},{"id":"sapphire","name":"サファイア"}],"title":"組織や意思の力を強める","desc":"ルチルクォーツ&アメジストに、更にサファイアをプラスすることで、組織や意思の力を強固にする力がプラスされます。"},{"id":"c049","category":"仕事運","categoryEn":"BUSINESS","wish":"男性の事業家におすすめの組み合わせ","pattern":3,"stones":[{"id":"rutilated-quartz","name":"ルチルクォーツ"},{"id":"onyx","name":"オニキス"}],"title":"相乗効果で経営を成功させる","desc":"オニキスは忍耐力や精神力を養う石で、目標を貫徹することを助ける石で、相乗効果をもたらし、大きなプロジェクトなどをやり遂げ成功を助けます。"},{"id":"c050","category":"仕事運","categoryEn":"BUSINESS","wish":"男性の事業家におすすめの組み合わせ","pattern":4,"stones":[{"id":"azurite","name":"アジュライト"},{"id":"jadeite","name":"翡翠"}],"title":"夢を顕在化させ到達スピードを早める","desc":"翡翠はドリームクリスタルともいわれ、自分の夢や願望を潜在意識に落とし込み、頭を強めるために非常に強い力を与えてくれる石です。アジュライトはそれに対してインスピレーションを強化し、目的への到達を早めてくれます。"},{"id":"c051","category":"仕事運","categoryEn":"BUSINESS","wish":"女性の事業家におすすめの組み合わせ","pattern":1,"stones":[{"id":"amethyst","name":"アメジスト"},{"id":"ruby","name":"ルビー"}],"title":"カリスマ性を高めて組織を強固にする","desc":"ルビーは非常に華やかで、強い力を持ち、カリスマ性と、行動力、意思や組織の力を強化するために役立ちます。ただ、多少感覚的になりすぎる部分があり、そこをアメジストが上手く調和し、バランスをとってくれます。"},{"id":"c052","category":"仕事運","categoryEn":"BUSINESS","wish":"女性の事業家におすすめの組み合わせ","pattern":2,"stones":[{"id":"sapphire","name":"サファイア"},{"id":"amethyst","name":"アメジスト"}],"title":"持ち主を守護し、安定した経営を実現","desc":"ルビーとアメジストの組み合わせよりもやんとなくしっかり、堅実な経営者向けの組み合わせです。ルビーかサファイアかは基本的には近い性質を持ち、持ち主を強力に保護する石です。"},{"id":"c053","category":"仕事運","categoryEn":"BUSINESS","wish":"女性の事業家におすすめの組み合わせ","pattern":3,"stones":[{"id":"jadeite","name":"翡翠"},{"id":"amber","name":"アンバー"}],"title":"堅実なエネルギーで確実に成長させる","desc":"ルチルクォーツ等が多きついと感じる人におすすめで、翡翠が人格的な成長を養い、アンバーは知恵や知識を与えてくれる石です。強烈なエネルギーではありませんが、確実に成長していきたいと考える人向きの組み合わせです。"},{"id":"c054","category":"仕事運","categoryEn":"BUSINESS","wish":"女性の事業家におすすめの組み合わせ","pattern":4,"stones":[{"id":"citrine","name":"シトリンクォーツ"},{"id":"garnet","name":"ガーネット"}],"title":"お金やエネルギーの循環を手助けに","desc":"エネルギーの好循環と前向きな変化の相乗効果が期待できる組み合わせです。金運なども高まりますが、貯まるというよりは、どんどん使って循環させていく働き方をしてくれます。"},{"id":"c055","category":"仕事運","categoryEn":"BUSINESS","wish":"出世したい","pattern":1,"stones":[{"id":"citrine","name":"シトリンクォーツ"},{"id":"sunstone","name":"サンストーン"}],"title":"エネルギー循環をパワーアップ","desc":"自分自身の欠点を補いながらエネルギーの良い循環をパワーアップさせるようにサポートしてくれる組み合わせです。"},{"id":"c056","category":"仕事運","categoryEn":"BUSINESS","wish":"出世したい","pattern":2,"stones":[{"id":"rutilated-quartz","name":"ルチルクォーツ"},{"id":"sunstone","name":"サンストーン"}],"title":"自己表現力を高めて人気を呼ぶ","desc":"快活な自己表現力を高めながら、さらにルチルクォーツがエネルギーを呼び寄せてくれる組み合わせです。"},{"id":"c057","category":"仕事運","categoryEn":"BUSINESS","wish":"人生のステップアップに","pattern":1,"stones":[{"id":"apatite","name":"アパタイト"},{"id":"chrysoprase","name":"クリソプレーズ"}],"title":"目標に向かうエネルギーを与える","desc":"具体的な目標がある時に、チャンスを引き寄せ、前に進むための瞬発力とエネルギーを与えてくれる組み合わせです。"},{"id":"c058","category":"仕事運","categoryEn":"BUSINESS","wish":"人生のステップアップに","pattern":2,"stones":[{"id":"blue-chalcedony","name":"ブルーカルセドニ"},{"id":"chrysoprase","name":"クリソプレーズ"}],"title":"自己実現を手助けする","desc":"自己達成、自己実現を助ける組み合わせで、とてもバランスのとれた組み合わせなので、人や状況をあまり選ばず使えます。"},{"id":"c059","category":"仕事運","categoryEn":"BUSINESS","wish":"夢の実現を助ける","pattern":1,"stones":[{"id":"azurite","name":"アジュライト"},{"id":"jadeite","name":"翡翠"}],"title":"必要な情報をキャッチしやすくする","desc":"翡翠が夢を潜在意識に落とし込み、アジュライトがインスピレーションを高め、夢のために必要な情報をキャッチする、理想的な組み合わせです。"},{"id":"c060","category":"仕事運","categoryEn":"BUSINESS","wish":"夢の実現を助ける","pattern":2,"stones":[{"id":"turquoise","name":"ターコイズ"},{"id":"amazonite","name":"アマゾナイト"}],"title":"相乗効果で夢の実現を手助け","desc":"希望の石であるアマゾナイトと、持ち主を強い災いから守るターコイズの相乗効果で、夢の実現をサポートします。"},{"id":"c061","category":"仕事運","categoryEn":"BUSINESS","wish":"自分の進む道を見つけやすくする","pattern":1,"stones":[{"id":"amazonite","name":"アマゾナイト"},{"id":"kunzite","name":"クンツァイト"}],"title":"持ち主に「気づき」を与えてくれる","desc":"クンツァイトは視点を変えることを教えてくれる石です。希望に満ちたアマゾナイトの光と交わる時、あなたのいつも見ているものが違って見えるかもしれません。"},{"id":"c062","category":"仕事運","categoryEn":"BUSINESS","wish":"自分の進む道を見つけやすくする","pattern":2,"stones":[{"id":"amazonite","name":"アマゾナイト"},{"id":"topaz","name":"トパーズ"}],"title":"自分に必要な道を示してくれる","desc":"トパーズは探しものと出会える石です。あなたにとって本当に必要なもの、アマゾナイトの幸運の力が引き寄せ、トパーズが気づかせてくれるでしょう。"},{"id":"c063","category":"仕事運","categoryEn":"BUSINESS","wish":"自分の進む道を見つけやすくする","pattern":3,"stones":[{"id":"topaz","name":"トパーズ"},{"id":"moonstone","name":"ムーンストーン"}],"title":"進むべき方向性を気づかせてくれる","desc":"ムーンストーンは未来予知の石ともいわれ、強くインスピレーションを高めてくれます。トパーズとの相乗効果で、自分にとって最も適した進むべき道に気づかせてくれる組み合わせです。"},{"id":"c064","category":"仕事運","categoryEn":"BUSINESS","wish":"自分の進む道を見つけやすくする","pattern":4,"stones":[{"id":"kyanite","name":"カイヤナイト"},{"id":"malachite","name":"マラカイト"}],"title":"自分の方向性を決定づける手助けに","desc":"いくつかの方向性に思い悩み、決めることができないでいる人におすすめの組み合わせです。カイヤナイトは突き進む力を与えてくれるので、進路決定後のお守りにも。"},{"id":"c065","category":"仕事運","categoryEn":"BUSINESS","wish":"研究者、探究者向きの組み合わせ","pattern":1,"stones":[{"id":"citrine","name":"シトリンクォーツ"},{"id":"amethyst","name":"アメジスト"},{"id":"kyanite","name":"カイヤナイト"}],"title":"物事に集中、それを継続させる","desc":"物事に集中し、継続させる力をシトリンクォーツとアメジストが最高のバランスでサポートする組み合わせです。受験勉強のサポートなどにもおすすめです。"},{"id":"c066","category":"仕事運","categoryEn":"BUSINESS","wish":"研究者、探究者向きの組み合わせ","pattern":2,"stones":[{"id":"kyanite","name":"カイヤナイト"},{"id":"stibnite-in-quartz","name":"スティブナイトインクォーツ"}],"title":"精神力と集中力、インスピレーションを与える","desc":"一つの物事に対してエネルギーを徹底して注いでいく精神力と集中力、そして強いインスピレーションをもたらしてくれる組み合わせです。何かに集中したい時や、学びの際にもおすすめです。"},{"id":"c067","category":"仕事運","categoryEn":"BUSINESS","wish":"聖職者、教師向けの石","pattern":1,"stones":[{"id":"amethyst","name":"アメジスト"},{"id":"lapis-lazuli","name":"ラピスラズリ"}],"title":"周囲への影響、カリスマ性を高める","desc":"持ち主を律し、周囲への影響力、カリスマ性を高める組み合わせ。リーダー的ポジションの人にとって続力、指導力を高めてくれます。"},{"id":"c068","category":"仕事運","categoryEn":"BUSINESS","wish":"聖職者、教師向けの石","pattern":2,"stones":[{"id":"aragonite","name":"アラゴナイト"},{"id":"lapis-lazuli","name":"ラピスラズリ"}],"title":"自分の力を引き出してくれる","desc":"指導者やリーダーで、部下等に遠慮して本音を言えない人におすすめの組み合わせ。自分の力を引き出し、カリスマ性、影響力を強めてくれます。"},{"id":"c069","category":"仕事運","categoryEn":"BUSINESS","wish":"営業職向けの石","pattern":1,"stones":[{"id":"aragonite","name":"アラゴナイト"},{"id":"mother-of-pearl","name":"マザーオブパール"}],"title":"長所を表現して人気運を高める","desc":"自分自身の良い面を上手く表現できるように促し、自分自身の魅力を高める組み合わせです。営業のみならず人間関係全般に対してお守りとなります。"},{"id":"c070","category":"仕事運","categoryEn":"BUSINESS","wish":"営業職向けの石","pattern":2,"stones":[{"id":"azurite","name":"アジュライト"},{"id":"sapphire","name":"サファイア"}],"title":"相手の心や感情を察知する","desc":"相手の気持ちや感情、何を求めているかを察知しやすくなる組み合わせです。営業面でさらにレベルアップしたい時に身につけたい組み合わせです。"},{"id":"c071","category":"仕事運","categoryEn":"BUSINESS","wish":"芸術家、アーティスト向けの組み合わせ","pattern":1,"stones":[{"id":"moonstone","name":"ムーンストーン"},{"id":"amazonite","name":"アマゾナイト"}],"title":"相乗効果で芸術性アップ","desc":"ムーンストーンのインスピレーションを高めるカとアマゾナイトの希望に満ちた創造的なエネルギーが相乗効果となり、芸術性を高めてくれます。"},{"id":"c072","category":"仕事運","categoryEn":"BUSINESS","wish":"芸術家、アーティスト向けの組み合わせ","pattern":2,"stones":[{"id":"carnelian","name":"カーネリアン"},{"id":"milky-quartz","name":"ミルキークォーツ"},{"id":"garnet","name":"ガーネット"}],"title":"才能を存分に引き出す芸能のお守り","desc":"才能を引き出し、伸ばし、見つけやすくするお守りとしては最高の組み合わせの一つ。静と動、陰と陽のバランスも良く、理想的な組み合わせです。"},{"id":"c073","category":"仕事運","categoryEn":"BUSINESS","wish":"経理、事務系の人に","pattern":1,"stones":[{"id":"smoky-quartz","name":"スモーキークォーツ"},{"id":"amethyst","name":"アメジスト"},{"id":"citrine","name":"シトリンクォーツ"}],"title":"心身のバランスをとりながら神経の癒やしを","desc":"循環を正常な状態に引き戻すシトリンクォーツにスモーキークォーツを加えた組み合わせはまさに三位一体、完璧な心身のバランスと調和をもたらします。"},{"id":"c074","category":"仕事運","categoryEn":"BUSINESS","wish":"占い、チャネリング等に向く組み合わせ","pattern":1,"stones":[{"id":"turquoise","name":"ターコイズ"},{"id":"aqua-aura","name":"アクアオーラ"}],"title":"直感力と判断力を高める","desc":"多次元的なレベルで、直感力と判断力を高めてくれます。占いにも役立つ組み合わせです。"},{"id":"c075","category":"仕事運","categoryEn":"BUSINESS","wish":"占い、チャネリング等に向く組み合わせ","pattern":2,"stones":[{"id":"azurite","name":"アジュライト"},{"id":"apatite","name":"アパタイト"}],"title":"宇宙からの情報を読み取る手助けに","desc":"アジュライトが宇宙からの情報を引き込み、アパタイトがその情報を翻訳者のように解読し、定着しやすくする、非常に強力な組み合わせです。"},{"id":"c076","category":"仕事運","categoryEn":"BUSINESS","wish":"ヒーラー、ボディーワーカー向け","pattern":1,"stones":[{"id":"moldavite","name":"モルダバイト"},{"id":"libyan-glass","name":"リビアングラス"},{"id":"meteorite-gibeon","name":"ギベオン"}],"title":"デルタ波を高める最高の相性","desc":"デルタ波を高めるうえでは最高の組み合わせです。非常に強いので、慣れないと湯あたりしたような感覚を受けるかもしれません。"},{"id":"c077","category":"仕事運","categoryEn":"BUSINESS","wish":"ヒーラー、ボディーワーカー向け","pattern":2,"stones":[{"id":"moldavite","name":"モルダバイト"},{"id":"azeztulite","name":"アゼツライト"}],"title":"代謝や免疫力を高めてくれる","desc":"デルタ波も高めますが、リンパの働きを高め、身体の新陳代謝や排毒の機能、自己免疫力を高めてくれる組み合わせです。施術にも自分自身にも。"},{"id":"c078","category":"仕事運","categoryEn":"BUSINESS","wish":"水商売、芸能関係に向く","pattern":1,"stones":[{"id":"aquamarine","name":"アクアマリン"},{"id":"peridot","name":"ペリドット"}],"title":"精神が弱くなったときのサポートに","desc":"根が真面目な人で、仕事上の嘘もつくのが辛いという人を精神的にサポートする組み合わせです。ストレスをきれいに流してくれます。"},{"id":"c079","category":"仕事運","categoryEn":"BUSINESS","wish":"水商売、芸能関係に向く","pattern":2,"stones":[{"id":"carnelian","name":"カーネリアン"},{"id":"milky-quartz","name":"ミルキークォーツ"},{"id":"garnet","name":"ガーネット"}],"title":"持ち主の才能を引き出してくれる","desc":"自分の才能を引き出し、伸ばし、見つけやすくする組み合わせです。オーディション等に最もおすすめの組み合わせです。"},{"id":"c080","category":"心身の健康","categoryEn":"HEALTH","wish":"疲労の回復","pattern":1,"stones":[{"id":"aragonite","name":"アラゴナイト"},{"id":"aventurine","name":"アベンチュリン"}],"title":"疲労を緩和してベストな状態に導く","desc":"仕事や人間関係の疲れなどから蓄積した疲労を緩和し、自分にとってベストな状態を引き出すためのサポートとなる組み合わせです。アベンチュリンがマイナスエネルギーの排出を、アラゴナイトがエネルギーの活性化を行います。"},{"id":"c081","category":"心身の健康","categoryEn":"HEALTH","wish":"疲労の回復","pattern":2,"stones":[{"id":"rhodochrosite","name":"ロードクロサイト"},{"id":"aventurine","name":"アベンチュリン"}],"title":"肉体疲労や冷え性の改善に","desc":"肉体レベルで、非常に強力な回復を促す組み合わせ。ロードクロサイトは女性の冷え性の緩和におすすめの石で、内側から体力をつけ、身体を元気にする力を持ちます。"},{"id":"c082","category":"心身の健康","categoryEn":"HEALTH","wish":"疲労の回復","pattern":3,"stones":[{"id":"tourmaline","name":"トルマリン"},{"id":"rose-quartz","name":"ローズクォーツ"}],"title":"エネルギーを循環させて心身の疲れを癒やす","desc":"トルマリンのみでも非常に高いエネルギーの循環と活性作用を持つのですが、ここにローズクォーツが加わることで、とても優しい精神面も含めた疲労の緩和を実現します。栄養ドリンクのようなイメージの組み合わせです。"},{"id":"c083","category":"心身の健康","categoryEn":"HEALTH","wish":"疲労の回復","pattern":4,"stones":[{"id":"lepidolite","name":"レピドライト"},{"id":"aventurine","name":"アベンチュリン"}],"title":"感情、精神、肉体の調和を取る","desc":"ともに癒やしの力を持つ二つの石を組み合わせることで相乗効果が生まれ、感情や精神の乱れ、肉体のバランスの調和を促し、疲労を回復するための強い助けとなってくれます。"},{"id":"c084","category":"心身の健康","categoryEn":"HEALTH","wish":"安眠のサポート","pattern":1,"stones":[{"id":"moonstone","name":"ムーンストーン"},{"id":"malachite","name":"マラカイト"}],"title":"相乗効果で安らかな眠りを誘う","desc":"マラカイトの破邪の力とムーンストーンの安らかなリズムを取り戻させる力が相乗効果を生み、安らかな眠りへと誘う組み合わせです。"},{"id":"c085","category":"心身の健康","categoryEn":"HEALTH","wish":"安眠のサポート","pattern":2,"stones":[{"id":"moonstone","name":"ムーンストーン"},{"id":"smoky-quartz","name":"スモーキークォーツ"},{"id":"seraphinite","name":"セラフィナイト"}],"title":"不安や恐怖を取り除いて安眠させる","desc":"スモーキークォーツは不安や恐怖から遠ざけ、安眠を助ける石。ムーンストーンの力と相まって、安心した眠りをもたらします。"},{"id":"c086","category":"心身の健康","categoryEn":"HEALTH","wish":"健康の維持、促進","pattern":1,"stones":[{"id":"aventurine","name":"アベンチュリン"},{"id":"apatite","name":"アパタイト"}],"title":"気の流れを整えて定着させる","desc":"感情、精神、肉体の調和を取る二つの石を組み合わせることで相乗効果が生まれ、アベンチュリンが気の流れを整え、アパタイトが良い状態を定着させるように動く組み合わせです。"},{"id":"c087","category":"心身の健康","categoryEn":"HEALTH","wish":"健康の維持、促進","pattern":2,"stones":[{"id":"aventurine","name":"アベンチュリン"},{"id":"hematite","name":"ヘマタイト"}],"title":"エネルギーと血液の循環を支える","desc":"アベンチュリンがエネルギーの循環を促し、ヘマタイトが血液に力を与え、トータルで健康的なエネルギーの循環を支える組み合わせです。"},{"id":"c088","category":"心身の健康","categoryEn":"HEALTH","wish":"生理の不調に、生理痛の緩和に","pattern":1,"stones":[{"id":"red-agate","name":"レッドアゲート"},{"id":"carnelian","name":"カーネリアン"}],"title":"血液と深い関係を持つ石たち","desc":"カルセドニ、アゲート系のなかでも血液と関係が深い二つの石の組み合わせ。生理不調の解消以外にも身体に活力を与えてくれるのでおすすめです。"},{"id":"c089","category":"心身の健康","categoryEn":"HEALTH","wish":"生理の不調に、生理痛の緩和に","pattern":2,"stones":[{"id":"garnet","name":"ガーネット"},{"id":"apatite","name":"アパタイト"}],"title":"血液に力を与えて安定させる","desc":"ガーネットは血液に力を与え安定させます。時々外しをして、身体本来の力を衰えさせないよう注意しましょう。"},{"id":"c090","category":"心身の健康","categoryEn":"HEALTH","wish":"病状回復のサポート","pattern":1,"stones":[{"id":"charoite","name":"チャロアイト"},{"id":"amber","name":"アンバー"}],"title":"排毒+癒やしの相乗効果","desc":"アンバーは優れた排毒の石であり、チャロアイトはエネルギー的なレベルでの癒やしをもたらします。"},{"id":"c091","category":"心身の健康","categoryEn":"HEALTH","wish":"病状回復のサポート","pattern":2,"stones":[{"id":"green-agate","name":"グリーンアゲート"},{"id":"apatite","name":"アパタイト"}],"title":"マイナスエネルギーを吸収する","desc":"グリーンアゲートがマイナスエネルギーを吸収し、さらにアパタイトが良い状態を引き出してくれます。"},{"id":"c092","category":"心身の健康","categoryEn":"HEALTH","wish":"休めない人、オンとオフが切り替えられない人","pattern":1,"stones":[{"id":"seraphinite","name":"セラフィナイト"},{"id":"aventurine","name":"アベンチュリン"}],"title":"身体に休息を与え正常化させる","desc":"オンとオフが切り替えられない、不眠症の人におすすめの組み合わせ。セラフィナイトが休息のスイッチを入れ、アベンチュリンがリズムを正常化してくれることで、心身ともにリラックスした状態を保てます。"},{"id":"c093","category":"心身の健康","categoryEn":"HEALTH","wish":"休めない人、オンとオフが切り替えられない人","pattern":2,"stones":[{"id":"seraphinite","name":"セラフィナイト"},{"id":"amethyst","name":"アメジスト"}],"title":"身体のシグナルにいち早く気づける","desc":"自分自身の限界が分かりやすくなる組み合わせです。忙しい毎日を送る現代のビジネスマンにおすすめです。"},{"id":"c094","category":"心身の健康","categoryEn":"HEALTH","wish":"休めない人、オンとオフが切り替えられない人","pattern":3,"stones":[{"id":"moonstone","name":"ムーンストーン"},{"id":"labradorite","name":"ラブラドライト"}],"title":"心身の休息をしっかりとサポート","desc":"神経系に作用し、エネルギーの過活動を鎮めてくれるので、身体だけでなくメンタル面の休息のサポートもしてくれます。"},{"id":"c095","category":"心身の健康","categoryEn":"HEALTH","wish":"休めない人、オンとオフが切り替えられない人","pattern":4,"stones":[{"id":"infinite","name":"インフィナイト"},{"id":"seraphinite","name":"セラフィナイト"}],"title":"不調を解消し自然な休息へと導く","desc":"エネルギー的に固定化してしまった不調のパターンをインフィナイトが取り除き、セラフィナイトが自然な流れで休息へと向かえるように持ち主の心に働きかけてくれます。"},{"id":"c096","category":"心身の健康","categoryEn":"HEALTH","wish":"強壮剤的に身体のエネルギーを活性化する","pattern":1,"stones":[{"id":"pink-tourmaline","name":"ピンクトルマリン"},{"id":"garnet","name":"ガーネット"}],"title":"エネルギーの入れ替えを促す","desc":"ガーネットが血液の力を引き出し、ピンクトルマリンが不要なエネルギーを抜きながら、大地からのエネルギーを取り込むサポートをします。"},{"id":"c097","category":"心身の健康","categoryEn":"HEALTH","wish":"強壮剤的に身体のエネルギーを活性化する","pattern":2,"stones":[{"id":"garnet","name":"ガーネット"},{"id":"ruby","name":"ルビー"}],"title":"身体を活性化させて体力を充実させる","desc":"非常に強力な活性作用を持つ組み合わせです。ガーネットが血液を、ルビーは筋肉に力を与えます。いわゆる栄養ドリンクに近い働きで、スポーツ選手などにもおすすめの組み合わせです。"},{"id":"c098","category":"心身の健康","categoryEn":"HEALTH","wish":"エネルギーの毒抜きをサポートする","pattern":1,"stones":[{"id":"amber","name":"アンバー"},{"id":"aventurine","name":"アベンチュリン"}],"title":"自然の力でエネルギー循環をサポート","desc":"アンバー=木、アベンチュリン=葉、森のエネルギー循環をそのまま結晶化したかのような組み合わせです。心身のストレス解消にもおすすめ。"},{"id":"c099","category":"心身の健康","categoryEn":"HEALTH","wish":"エネルギーの毒抜きをサポートする","pattern":2,"stones":[{"id":"citrine","name":"シトリンクォーツ"},{"id":"aventurine","name":"アベンチュリン"}],"title":"自然の流れを象徴する組み合わせ","desc":"太陽と森のような自然の流れを象徴する組み合わせです。シトリンはエネルギーの循環の力を持ち、アベンチュリンが相乗効果を生みます。"},{"id":"c100","category":"心身の健康","categoryEn":"HEALTH","wish":"持久力、生命力を高める","pattern":1,"stones":[{"id":"garnet","name":"ガーネット"},{"id":"onyx","name":"オニキス"}],"title":"精神と肉体をパワーアップ","desc":"とても無理だと思うような困難に立ち向かう時等に精神、肉体の両面を強くしてくれます。生命力を高め、蓄積的なものからの防御にもなります。"},{"id":"c101","category":"心身の健康","categoryEn":"HEALTH","wish":"持久力、生命力を高める","pattern":2,"stones":[{"id":"garnet","name":"ガーネット"},{"id":"hypersthene","name":"ハイパーシーン"}],"title":"心身ともに持続力を高める","desc":"持久力を強く高める組み合わせです。ガーネットが肉体面を、ハイパーシーンが精神面を強くサポートし、相乗的に働きます。"},{"id":"c102","category":"心身の健康","categoryEn":"HEALTH","wish":"ダイエットや体質改善のお守り","pattern":1,"stones":[{"id":"kyanite","name":"カイヤナイト"},{"id":"sodalite","name":"ソーダライト"}],"title":"物事を継続する力を与える","desc":"ダイエットはもちろん、継続が必要なプロジェクトや体質改善を強くサポートしてくれる石で、結果を出すための良いひらめきも生まれる組み合わせ。"},{"id":"c103","category":"心身の健康","categoryEn":"HEALTH","wish":"ダイエットや体質改善のお守り","pattern":2,"stones":[{"id":"amethyst","name":"アメジスト"},{"id":"onyx","name":"オニキス"}],"title":"忍耐力をアップして困難な状況を乗り越える","desc":"困難な状況に耐えるための精神力を養う組み合わせです。受験勉強や過酷なスポーツのトレーニング時などにも良い組み合わせです。"},{"id":"c104","category":"心身の健康","categoryEn":"HEALTH","wish":"年配の人におすすめ、身体が楽に動きやすくなる組み合わせ","pattern":1,"stones":[{"id":"smoky-quartz","name":"スモーキークォーツ"},{"id":"aventurine","name":"アベンチュリン"}],"title":"優しく作用して身体への負担なし","desc":"活性力の強い石が、身体の負担なるかなり強すぎる場合もあります。ここでは作用が柔らかく、年配の方でも安心して身につけることのできる組み合わせをご紹介します。"},{"id":"c105","category":"心身の健康","categoryEn":"HEALTH","wish":"自然体の自分になるためのサポート","pattern":1,"stones":[{"id":"amber","name":"アンバー"},{"id":"smoky-quartz","name":"スモーキークォーツ"}],"title":"力を抜いて不安を取り除く","desc":"アンバーが余分なカやエネルギーを抜き、スモーキークォーツが不安や強迫観念を取り除くサポートをしてくれる組み合わせです。"},{"id":"c106","category":"心身の健康","categoryEn":"HEALTH","wish":"自然体の自分になるためのサポート","pattern":2,"stones":[{"id":"chrysocolla","name":"クリソコラ"},{"id":"iolite","name":"アイオライト"}],"title":"自分へのプレッシャーを和らげる","desc":"プレッシャーを和らげ、「こうでなくてはならない」という自分自身への決めつけを外すサポートをしてくれる組み合わせです。"},{"id":"c107","category":"心身の健康","categoryEn":"HEALTH","wish":"地に足を着け、心身のバランスをとる(グラウンディング)","pattern":1,"stones":[{"id":"onyx","name":"オニキス"},{"id":"amber","name":"アンバー"},{"id":"smoky-quartz","name":"スモーキークォーツ"}],"title":"心の浮つきを抑えて安定させる","desc":"心の浮つきやブレを抑え、安定感を高める組み合わせです。受験勉強、継続が必要なことや困難に立ち向かう時のお守りとしておすすめです。"},{"id":"c108","category":"心身の健康","categoryEn":"HEALTH","wish":"地に足を着け、心身のバランスをとる(グラウンディング)","pattern":2,"stones":[{"id":"hematite","name":"ヘマタイト"},{"id":"smoky-quartz","name":"スモーキークォーツ"}],"title":"精神力を高めて安定感をもたらす","desc":"ヘマタイトは少々のことに負けない精神的な強さを養う石です。スモーキークォーツとの相乗効果で、心身ともに安定感をもたらします。"},{"id":"c109","category":"心身の健康","categoryEn":"HEALTH","wish":"感情の高ぶりや怒りを抑える","pattern":1,"stones":[{"id":"iolite","name":"アイオライト"},{"id":"amethyst","name":"アメジスト"}],"title":"感情の激昂を抑えて冷静にする","desc":"自分自身の固定観念を外し、感情の高ぶりを抑え、より良い判断ができるように促す組み合わせです。心を落ち着かせるので冷静な判断力が必要な時、難しい商談や交渉事を控えている時などにもおすすめです。"},{"id":"c110","category":"心身の健康","categoryEn":"HEALTH","wish":"感情の高ぶりや怒りを抑える","pattern":2,"stones":[{"id":"iolite","name":"アイオライト"},{"id":"garden-quartz","name":"ガーデンクォーツ"}],"title":"肝臓のダメージを緩和して心を鎮める","desc":"肝臓のダメージが溜まり、精神的にも不安定で怒りなどの感情が出やすくなっている時にも効果的です。そうしたダメージを緩和しながら、ネガティブな感情をしっかりと鎮めてくれます。"},{"id":"c111","category":"心身の健康","categoryEn":"HEALTH","wish":"感情の高ぶりや怒りを抑える","pattern":3,"stones":[{"id":"iolite","name":"アイオライト"},{"id":"smoky-quartz","name":"スモーキークォーツ"},{"id":"amazonite","name":"アマゾナイト"}],"title":"ネガティブをポジティブに変換","desc":"ネガティブな思考や感情が定着してしまっている時に、それをポジティブな思考や感情に変換していくサポートとなる組み合わせです。"},{"id":"c112","category":"心身の健康","categoryEn":"HEALTH","wish":"感情の高ぶりや怒りを抑える","pattern":4,"stones":[{"id":"iolite","name":"アイオライト"},{"id":"amber","name":"アンバー"}],"title":"余分なエネルギーを排出して心を穏やかに","desc":"余分なエネルギーを排出して心を穏やかにする組み合わせで、アンバーが不要なエネルギーも排出してくれます。"},{"id":"c113","category":"心身の健康","categoryEn":"HEALTH","wish":"うつ状態の緩和","pattern":1,"stones":[{"id":"amazonite","name":"アマゾナイト"},{"id":"amethyst","name":"アメジスト"}],"title":"持ち主の心に希望を抱かせる","desc":"精神的に希望を持たせるように導く組み合わせです。特に自己コントロールが苦手と感じる人には、この組み合わせは非常に扱いやすいです。"},{"id":"c114","category":"心身の健康","categoryEn":"HEALTH","wish":"うつ状態の緩和","pattern":2,"stones":[{"id":"amethyst","name":"アメジスト"},{"id":"amber","name":"アンバー"}],"title":"不要なエネルギーを排出して心身を安定させる","desc":"不要なエネルギーを排出して心身を安定させる組み合わせで、アンバーが不要なエネルギーを追い出し、ニュートラルな状態に引き戻しています。"},{"id":"c115","category":"心身の健康","categoryEn":"HEALTH","wish":"うつ状態の緩和","pattern":3,"stones":[{"id":"amethyst","name":"アメジスト"},{"id":"rose-quartz","name":"ローズクォーツ"}],"title":"ストレスを解消してうつの「予防」に","desc":"どちらかというと予防系の組み合わせで、うつの初期症状に有効です。小さな子供でも安心して使える組み合わせなので、お客様相談係やクレームセンターなどのお仕事をされている方におすすめしたい組み合わせです。"},{"id":"c116","category":"心身の健康","categoryEn":"HEALTH","wish":"うつ状態の緩和","pattern":4,"stones":[{"id":"amethyst","name":"アメジスト"},{"id":"garnet","name":"ガーネット"}],"title":"肉体面からうつ状態をサポート","desc":"ガーネットがホルモンバランスや血液に力を与え、アメジストが調和と安定へと導きます。特に体力が落ちている時に、体力的な不調からくるうつ症状に対して効果的な組み合わせです。"},{"id":"c117","category":"心身の健康","categoryEn":"HEALTH","wish":"ストレスの緩和","pattern":1,"stones":[{"id":"aventurine","name":"アベンチュリン"},{"id":"jadeite","name":"翡翠"}],"title":"心を鎮めておおらかな心を生み出す","desc":"心を鎮めることで平穏な精神状態をもたらしてくれます。物事に対しての考え方を良い意味でおおらかにしてくれるので、特に欲求不満型のストレスに対して効果があります。"},{"id":"c118","category":"心身の健康","categoryEn":"HEALTH","wish":"ストレスの緩和","pattern":2,"stones":[{"id":"amethyst","name":"アメジスト"},{"id":"kunzite","name":"クンツァイト"},{"id":"rhodochrosite","name":"ロードクロサイト"}],"title":"心と身体のストレスを同時にケア","desc":"子育てや介護、日々の肉体的・精神的疲労からくるストレスを、クンツァイトとアメジストが精神面から、ロードクロサイトが肉体面からサポートしてくれます。"},{"id":"c119","category":"心身の健康","categoryEn":"HEALTH","wish":"ストレスの緩和","pattern":3,"stones":[{"id":"aquamarine","name":"アクアマリン"},{"id":"citrine","name":"シトリンクォーツ"}],"title":"エネルギーを循環させてストレスを解消する","desc":"循環不全型のストレスに対して効果的な組み合わせです。自己表現が苦手な人や、エネルギーが上手く回っていない状態の人に良い流れを作るサポートをし、エネルギーの滞りを解消してくれます。"},{"id":"c120","category":"心身の健康","categoryEn":"HEALTH","wish":"ストレスの緩和","pattern":4,"stones":[{"id":"aquamarine","name":"アクアマリン"},{"id":"amber","name":"アンバー"}],"title":"エネルギーのデトックス効果","desc":"パターン3のアクアマリン&シトリンクォーツが、力を抜きたい人向けの組み合わせなら、こちらはアクアマリンとアンバーが、ともにエネルギーの毒をきれいに流して体外に排出してくれます。"},{"id":"c121","category":"心身の健康","categoryEn":"HEALTH","wish":"自己認識力を高める 自分自身がよりわかりやすくなる","pattern":1,"stones":[{"id":"amethyst","name":"アメジスト"},{"id":"turquoise","name":"ターコイズ"}],"title":"余計な気を祓い、心を落ち着かせる","desc":"瞑想に適した組み合わせで、邪念や邪気が入るのを防いでくれます。自分自身の内面に落ち着いてアクセスしたい時にとても良い助けとなってくれるでしょう。"},{"id":"c122","category":"心身の健康","categoryEn":"HEALTH","wish":"自己認識力を高める 自分自身がよりわかりやすくなる","pattern":2,"stones":[{"id":"amethyst","name":"アメジスト"},{"id":"labradorite","name":"ラブラドライト"}],"title":"迷いを解決するインスピレーションを与える","desc":"自分の中の迷いを祓い、答えを見つけ出したい時におすすめの組み合わせです。人生における自分自身の方向性を見つけたい重要な時に、必要なインスピレーションをもたらしてくれるでしょう。"},{"id":"c123","category":"心身の健康","categoryEn":"HEALTH","wish":"自己認識力を高める 自分自身がよりわかりやすくなる","pattern":3,"stones":[{"id":"tanzanite","name":"タンザナイト"},{"id":"kyanite","name":"カイヤナイト"}],"title":"ひらめきを与え、進むべき道を諭す","desc":"自分自身の人生のテーマに深く入っていくことを助ける石です。自分の中で答えを見つけたい時、人生の方向性、研究をしている物など、さまざまな面において、沢山のひらめきと気づきを与えてくれる組み合わせです。"},{"id":"c124","category":"心身の健康","categoryEn":"HEALTH","wish":"自己認識力を高める 自分自身がよりわかりやすくなる","pattern":4,"stones":[{"id":"iolite","name":"アイオライト"},{"id":"labradorite","name":"ラブラドライト"}],"title":"自分を上手く認識させてくれる","desc":"自分自身の状態をつかみやすくし、さまざまな面での失敗や損失を防ぐ助けとなる組み合わせです。自然に自分の心の奥底にアクセスしている状態を作り出し、多くの気づきをもたらします。"},{"id":"c125","category":"心身の健康","categoryEn":"HEALTH","wish":"勇気、自信をもたらす","pattern":1,"stones":[{"id":"peridot","name":"ペリドット"},{"id":"apatite","name":"アパタイト"},{"id":"amber","name":"アンバー"}],"title":"心身を支えて自信を生む","desc":"人に自信をつけさせる組み合わせで、ペリドットとアンバーが心身の両面から支え、アパタイトが良い状態を定着させるように働きます。"},{"id":"c126","category":"心身の健康","categoryEn":"HEALTH","wish":"勇気、自信をもたらす","pattern":2,"stones":[{"id":"peridot","name":"ペリドット"},{"id":"onyx","name":"オニキス"}],"title":"困難を乗り越える勇気を与える","desc":"困難なことに立ち向かう勇気を与えてくれる組み合わせです。オニキスは意思の強さをペリドットは心を強く支えてくれる石です。"},{"id":"c127","category":"心身の健康","categoryEn":"HEALTH","wish":"判断力、決断力を高める","pattern":1,"stones":[{"id":"iolite","name":"アイオライト"},{"id":"turquoise","name":"ターコイズ"}],"title":"頭をクリアにして冷静にする","desc":"物事を冷静に見る視点を養い、頭の中をクリアにするサポートをしてくれます。人間関係の問題解決にも役立つ組み合わせです。"},{"id":"c128","category":"心身の健康","categoryEn":"HEALTH","wish":"判断力、決断力を高める","pattern":2,"stones":[{"id":"malachite","name":"マラカイト"},{"id":"kyanite","name":"カイヤナイト"}],"title":"基準を決めて判断を素早くする","desc":"判断基準を明確化し、よどみを祓い、さまざまな物事に対する判断と決断をしやすくする組み合わせで、非常にクリアで強力な組み合わせです。"},{"id":"c129","category":"心身の健康","categoryEn":"HEALTH","wish":"自分に今必要なものを選びやすくなる","pattern":1,"stones":[{"id":"prehnite","name":"プレナイト"},{"id":"amazonite","name":"アマゾナイト"}],"title":"自分にとって必要なものが見える","desc":"自分にとって必要、不必要が見分けやすくなる組み合わせです。人や環境、仕事はもちろん、現実的な掃除などの助けにもなります。"},{"id":"c130","category":"心身の健康","categoryEn":"HEALTH","wish":"自分に今必要なものを選びやすくなる","pattern":2,"stones":[{"id":"topaz","name":"トパーズ"},{"id":"amazonite","name":"アマゾナイト"}],"title":"チャンスを見つけ、つかむ手助けに","desc":"目の前のもやもやを晴らすように、環境、人、仕事等全ての物事において、自分にとって必要なチャンスを見つけやすくしてくれます。"},{"id":"c131","category":"心身の健康","categoryEn":"HEALTH","wish":"生活習慣の改善","pattern":1,"stones":[{"id":"garden-quartz","name":"ガーデンクォーツ"},{"id":"hypersthene","name":"ハイパーシーン"}],"title":"悪習慣を良い方向へ導く","desc":"染み付いた悪い習慣と自分自身の間に違和感をもたらし、自然と良い方向へ変化するよう導く組み合わせです。人間関係の悪縁を絶つ助けにも。"},{"id":"c132","category":"心身の健康","categoryEn":"HEALTH","wish":"生活習慣の改善","pattern":2,"stones":[{"id":"chrysocolla","name":"クリソコラ"},{"id":"citrine","name":"シトリンクォーツ"}],"title":"生活リズムを正す","desc":"現代人に多い夜型など、本来の生活リズムが崩れている人に、あるべきリズムを取り戻す助けとなってくれる組み合わせです。"},{"id":"c133","category":"人間関係","categoryEn":"RELATIONSHIP","wish":"円滑な人間関係","pattern":1,"stones":[{"id":"aquamarine","name":"アクアマリン"},{"id":"blue-lace-agate","name":"ブルーレースアゲート"}],"title":"エネルギーを循環させ、安らぎを与える","desc":"流れを象徴するアクアマリンと安らぎに満ちたブルーレースアゲートの組み合わせ。安心感に満ちたコミュニケーションの中でのエネルギーの流れを強化します。"},{"id":"c134","category":"人間関係","categoryEn":"RELATIONSHIP","wish":"円滑な人間関係","pattern":2,"stones":[{"id":"aragonite","name":"アラゴナイト"},{"id":"mother-of-pearl","name":"マザーオブパール"}],"title":"人気運やコミュニケーション力を高める","desc":"自分自身の感情を上手く表現できない人におすすめの組み合わせです。人気運を高め、コミュニケーションの中でのエネルギーの流れを強化します。"},{"id":"c135","category":"人間関係","categoryEn":"RELATIONSHIP","wish":"良縁に恵まれる","pattern":1,"stones":[{"id":"pink-chalcedony","name":"ピンクカルセドニ"},{"id":"amazonite","name":"アマゾナイト"}],"title":"幸運を呼び良い縁をもたらす","desc":"アマゾナイトが幸運を呼ぶ石、カルセドニの力と相まって自分にとって良い流れを作る縁を運んでくれます。"},{"id":"c136","category":"人間関係","categoryEn":"RELATIONSHIP","wish":"良縁に恵まれる","pattern":2,"stones":[{"id":"amethyst","name":"アメジスト"},{"id":"pink-chalcedony","name":"ピンクカルセドニ"}],"title":"人との結びつきと調和を象徴","desc":"カルセドニの結びつける力とアメジストの調和と安定の力が良縁を引き寄せ、しっかりと縁を繋げるためのサポートをしてくれます。"},{"id":"c137","category":"人間関係","categoryEn":"RELATIONSHIP","wish":"人間関係の絆を深める","pattern":1,"stones":[{"id":"larimar","name":"ラリマー"},{"id":"apatite","name":"アパタイト"}],"title":"お互いの信頼を深めてくれる","desc":"人間関係において信頼する力を高めます。家族、親友、夫婦など、現在ある関係に対してエネルギーレベルで共感や共鳴をもたらします。"},{"id":"c138","category":"人間関係","categoryEn":"RELATIONSHIP","wish":"人間関係の絆を深める","pattern":2,"stones":[{"id":"larimar","name":"ラリマー"},{"id":"amethyst","name":"アメジスト"}],"title":"言葉を超えた信頼をもたらす","desc":"現状の人間関係をさらに発展させる組み合わせであり、すべての人間関係において不和を解消し、調和の方向へ導く組み合わせです。"},{"id":"c139","category":"人間関係","categoryEn":"RELATIONSHIP","wish":"人間関係の絆を深める","pattern":3,"stones":[{"id":"kunzite","name":"クンツァイト"},{"id":"larimar","name":"ラリマー"}],"title":"お互いが共感できる力を高める","desc":"人間関係における共感する力を高める組み合わせです。あらゆる関係において人の心を読み取る力を高めるのですが、そのぶん人から受けるエネルギーも強くなるため、邪気祓いの石も一緒に持ったほうがよいでしょう。"},{"id":"c140","category":"人間関係","categoryEn":"RELATIONSHIP","wish":"人間関係の絆を深める","pattern":4,"stones":[{"id":"rose-quartz","name":"ローズクォーツ"},{"id":"rhodonite","name":"ロードナイト"}],"title":"自分の思いを伝える手助けに","desc":"女性としての魅力を高め、女性同士の人間関係を良好に保つ助けとなってくれる組み合わせです。自他の愛と勇気の心を高め、自分自身の思いをきちんと伝えていくサポートをしてくれます。"},{"id":"c141","category":"人間関係","categoryEn":"RELATIONSHIP","wish":"家族関係、親子関係の絆を深める","pattern":1,"stones":[{"id":"pink-opal","name":"ピンクオパール"},{"id":"amethyst","name":"アメジスト"}],"title":"精神面、生理的なレベルを高める","desc":"家族の中では母親が持つべき石です。ピンクオパールの持つ強い女性性は、精神面はもとより、生理的なレベルを含めて肉体も守ってくれます。アメジストは全体を調和のエネルギーに導きます。"},{"id":"c142","category":"人間関係","categoryEn":"RELATIONSHIP","wish":"家族関係、親子関係の絆を深める","pattern":2,"stones":[{"id":"onyx","name":"オニキス"},{"id":"mother-of-pearl","name":"マザーオブパール"}],"title":"家族間でお互いを尊重できるように","desc":"家族間の悪い意味での甘えを抑え、良い意味での節度を持った相手を尊重する行動をとれるようになる組み合わせです。子育てのお守りとしてもとても良い組み合わせです。"},{"id":"c143","category":"人間関係","categoryEn":"RELATIONSHIP","wish":"家族関係、親子関係の絆を深める","pattern":3,"stones":[{"id":"aquamarine","name":"アクアマリン"},{"id":"pink-chalcedony","name":"ピンクカルセドニ"}],"title":"結婚後の家族円満のお守り","desc":"結婚生活におけるコミュニケーションを良質にし、家族全体の関係を良い方向へ導く組み合わせです。夫婦間の会話が減っていると感じる方におすすめで、男女どちらが持っても問題のない組み合わせです。"},{"id":"c144","category":"人間関係","categoryEn":"RELATIONSHIP","wish":"表現力と魅力、人気運を高める","pattern":1,"stones":[{"id":"amber","name":"アンバー"},{"id":"aquamarine","name":"アクアマリン"}],"title":"感情レベルで毒素を排出してくれる","desc":"感情的なレベルでのエネルギーの解毒をする組み合わせです。思っていることを素直に表現できずに、感情的なブロックを取り除き、人間関係全般にも有効です。"},{"id":"c145","category":"人間関係","categoryEn":"RELATIONSHIP","wish":"表現力と魅力、人気運を高める","pattern":2,"stones":[{"id":"aragonite","name":"アラゴナイト"},{"id":"mother-of-pearl","name":"マザーオブパール"}],"title":"新たな世界への扉を開く手助けに","desc":"マザーオブパールが真珠の母体からできることと関係があるのかどうかは分かりませんが、自分の殻に閉じこもりがちな人に特におすすめの組み合わせです。自己表現の力と人気運を高める組み合わせです。"},{"id":"c146","category":"人間関係","categoryEn":"RELATIONSHIP","wish":"表現力と魅力、人気運を高める","pattern":3,"stones":[{"id":"aragonite","name":"アラゴナイト"},{"id":"carnelian","name":"カーネリアン"}],"title":"仲間内で主役になれるお守り","desc":"特に人から注目されたり人気を高めたりするのに有用な組み合わせです。カーネリアンは広げる力と肉体的な魅力を伝える力を持つため、性的なアピール度も高まります。恋愛のチャンスも広がります。"},{"id":"c147","category":"人間関係","categoryEn":"RELATIONSHIP","wish":"表現力と魅力、人気運を高める","pattern":4,"stones":[{"id":"aragonite","name":"アラゴナイト"},{"id":"pink-chalcedony","name":"ピンクカルセドニ"}],"title":"堅実な人間関係を築く手助けに","desc":"信頼を伴った人間関係を広げていくのにおすすめの組み合わせです。アラゴナイトが表現力を高め、カルセドニは繋がる縁の力を強化します。しっかりと自分の周囲の人間関係を作っていきたい時におすすめです。"},{"id":"c148","category":"人間関係","categoryEn":"RELATIONSHIP","wish":"悪縁を絶つ","pattern":1,"stones":[{"id":"prehnite","name":"プレナイト"},{"id":"aventurine","name":"アベンチュリン"}],"title":"必要のないものを浮き上がらせる","desc":"自分にとって不要な人やものをわかりやすくし、切り離す助けをする石です。人間関係はもちろん、健康のためのダイエットにも効果的です。"},{"id":"c149","category":"人間関係","categoryEn":"RELATIONSHIP","wish":"悪縁を絶つ","pattern":2,"stones":[{"id":"prehnite","name":"プレナイト"},{"id":"moonstone","name":"ムーンストーン"},{"id":"topaz","name":"トパーズ"}],"title":"本当に必要なものを気づかせてくれる","desc":"自分にとって本当に必要なものを選ぶインスピレーションを高めてくれます。人間関係はもちろん、部屋の掃除など、片づけられない人にも。"},{"id":"c150","category":"人間関係","categoryEn":"RELATIONSHIP","wish":"人間関係における問題解決","pattern":1,"stones":[{"id":"iolite","name":"アイオライト"},{"id":"turquoise","name":"ターコイズ"}],"title":"感性を高めて感情を鎮める","desc":"問題の当事者である場合におすすめで、ターコイズの感性を高める力とアイオライトの感情面での鎮静の力が相乗的にサポートします。"},{"id":"c151","category":"人間関係","categoryEn":"RELATIONSHIP","wish":"人間関係における問題解決","pattern":2,"stones":[{"id":"lapis-lazuli","name":"ラピスラズリ"},{"id":"kyanite","name":"カイヤナイト"}],"title":"物事の全体像を見えやすくする","desc":"相手の感情や考えをつかみやすくなり、物事の全体像を把握する観察力や判断力をサポートしてくれます。問題の当事者にも第三者にも。"},{"id":"c152","category":"お守り","categoryEn":"GUARD","wish":"受験や資格試験など本番のお守り","pattern":1,"stones":[{"id":"amber","name":"アンバー"},{"id":"tigers-eye","name":"タイガーアイ"}],"title":"緊張を解き、勝負強さを高める","desc":"アンバーが余分な力や緊張を解きほぐし、タイガーアイが判断力や勝負強さを高める組み合わせ。受験はもちろん勝負事におすすめの組み合わせです。"},{"id":"c153","category":"お守り","categoryEn":"GUARD","wish":"受験や資格試験など本番のお守り","pattern":2,"stones":[{"id":"fluorite","name":"フローライト"},{"id":"moonstone","name":"ムーンストーン"}],"title":"頭の切り替えをスムーズにする","desc":"頭をクリアにし、アウトプットしやすくしてくれます。必要な情報などはもちろん仕事などにも常に使えます。"},{"id":"c154","category":"お守り","categoryEn":"GUARD","wish":"受験や資格試験の勉強を助けるお守り","pattern":1,"stones":[{"id":"amethyst","name":"アメジスト"},{"id":"onyx","name":"オニキス"}],"title":"強固な意思を作る手助けに","desc":"意思を強くする組み合わせです。ダイエットなどにもおすすめですが、集中と継続が必要な受験勉強などにはとても頼りになる組み合わせです。"},{"id":"c155","category":"お守り","categoryEn":"GUARD","wish":"受験や資格試験の勉強を助けるお守り","pattern":2,"stones":[{"id":"smoky-quartz","name":"スモーキークォーツ"},{"id":"onyx","name":"オニキス"}],"title":"忍耐力と集中力を高める","desc":"スポーツなどの苦しい練習や受験勉強などに、意思を強くし、やり遂げる強さと集中力をもたらす組み合わせです。浮つきがちな人におすすめです。"},{"id":"c156","category":"お守り","categoryEn":"GUARD","wish":"新しいチャレンジのお守り","pattern":1,"stones":[{"id":"citrine","name":"シトリンクォーツ"},{"id":"amazonite","name":"アマゾナイト"}],"title":"物事の流れにうまく乗る","desc":"チャンスがきた時にうまく流れに乗る助けとなる組み合わせです。エネルギーの循環をきれいにし、幸運体質にする組み合わせといえます。"},{"id":"c157","category":"お守り","categoryEn":"GUARD","wish":"新しいチャレンジのお守り","pattern":2,"stones":[{"id":"onyx","name":"オニキス"},{"id":"tigers-eye","name":"タイガーアイ"}],"title":"周りに左右されないブレない軸を生む","desc":"強い意思を持ち、人に流されなくなる組み合わせです。判断力や洞察力も高まるので独立する人にとっては強いお守りとなる組み合わせです。"},{"id":"c158","category":"お守り","categoryEn":"GUARD","wish":"旅のお守り","pattern":1,"stones":[{"id":"turquoise","name":"ターコイズ"},{"id":"moonstone","name":"ムーンストーン"},{"id":"aquamarine","name":"アクアマリン"}],"title":"旅のお守りの代表格","desc":"昼と夜の空、そして海の力を象徴するこの組み合わせは、世界中どこにいても同じ空の下で繋がっている。そう思わせてくれます。あらゆる旅のお守りとして最高のものです、プレゼントにもとてもおすすめです。"},{"id":"c159","category":"お守り","categoryEn":"GUARD","wish":"霊障害を受けやすい人のお守り","pattern":1,"stones":[{"id":"sugilite","name":"スギライト"},{"id":"amazonite","name":"アマゾナイト"}],"title":"強いクセをアマゾナイトが優しくカバー","desc":"スギライトは比較的エネルギー的なクセの強い石で、合わないと感じる人も多いようです。そんな人にすすめたいのがこの組み合わせで、アマゾナイトの明るさと柔らかさがスギライトのクセを緩和し、扱いやすくなっています。"},{"id":"c160","category":"お守り","categoryEn":"GUARD","wish":"霊障害を受けやすい人のお守り","pattern":2,"stones":[{"id":"sugilite","name":"スギライト"},{"id":"citrine","name":"シトリンクォーツ"}],"title":"相乗効果で霊的な外傷から身を守る","desc":"スギライトの持つエネルギーとシトリンクォーツのエネルギーが相乗的に働く組み合わせで、霊的なものに対する霊的なお守りの力がさらに強くなります。"},{"id":"c161","category":"お守り","categoryEn":"GUARD","wish":"霊障害を受けやすい人のお守り","pattern":3,"stones":[{"id":"sugilite","name":"スギライト"},{"id":"morion","name":"モリオン"}],"title":"もっとも強い霊障害からのお守り","desc":"霊的なお守りの組み合わせとしてはある意味最強といえる組み合わせです。ただ、やや強すぎるので、慣れるまでに時間がかかるかもしれません。職業として霊的なものを扱う方や、ヒーリングをされている人に特に向いています。"},{"id":"c162","category":"お守り","categoryEn":"GUARD","wish":"霊障害を受けやすい人のお守り","pattern":4,"stones":[{"id":"sugilite","name":"スギライト"},{"id":"silver-rutile-quartz","name":"シルバールチルクォーツ"},{"id":"garnet","name":"ガーネット"}],"title":"霊的なダメージを癒やす","desc":"霊的なダメージを負った人の回復を助ける組み合わせです。ガーネットが生命力を高め、シルバールチルとスギライトがマイナスの影響から持ち主を守ります。"},{"id":"c163","category":"お守り","categoryEn":"GUARD","wish":"厄よけ、災いから持ち主を守る","pattern":1,"stones":[{"id":"eye-agate","name":"天眼石"},{"id":"hematite","name":"ヘマタイト"}],"title":"生命力を活性化させて災いから守る","desc":"天眼石の破邪の力にヘマタイトが相乗の力を与える組み合わせです。"},{"id":"c164","category":"お守り","categoryEn":"GUARD","wish":"厄よけ、災いから持ち主を守る","pattern":2,"stones":[{"id":"prehnite","name":"プレナイト"},{"id":"turquoise","name":"ターコイズ"}],"title":"対人の災いを防ぐ","desc":"人間関係における災いやトラブルを受けつらくする組み合わせです。プレナイトは必要と不必要なものをきれいに分ける力を持ち、ターコイズはインスピレーションを受けつらくします。"},{"id":"c165","category":"お守り","categoryEn":"GUARD","wish":"厄よけ、災いから持ち主を守る","pattern":3,"stones":[{"id":"eye-agate","name":"天眼石"},{"id":"malachite","name":"マラカイト"}],"title":"強力な力を持つ魔よけのお守り","desc":"両方の石ともに眼を持つ強力な破邪の石の組み合わせです。非常に強力な魔よけ、災いよけとして働きます。一見クセの強い組み合わせにも見えますが、万人が身につけやすいバランスの取れた組み合わせです。"},{"id":"c166","category":"お守り","categoryEn":"GUARD","wish":"厄よけ、災いから持ち主を守る","pattern":4,"stones":[{"id":"pyrite","name":"パイライト"},{"id":"morion","name":"モリオン"}],"title":"霊的、環境的ともに災いを防ぐ万能お守り","desc":"二つともが強力なバリアのようなフィールドを作る石でありながら、効果を発揮する領域が異なるため、霊的な影響、環境的な影響など、総合的に災いのエネルギーを防いでくれる組み合わせです。"},{"id":"c167","category":"お守り","categoryEn":"GUARD","wish":"子宝のお守り","pattern":1,"stones":[{"id":"bloodstone","name":"ブラッドストーン"},{"id":"garnet","name":"ガーネット"},{"id":"apatite","name":"アパタイト"}],"title":"子宝のお守りとしては最高クラス","desc":"子供を授かりやすくする組み合わせとしては最高のもの。アパタイトは他の二つの石のエネルギーをさらに定着させるように働きます。"},{"id":"c168","category":"お守り","categoryEn":"GUARD","wish":"子宝のお守り","pattern":2,"stones":[{"id":"bloodstone","name":"ブラッドストーン"},{"id":"red-rutile-quartz","name":"レッドルチルクォーツ"}],"title":"肉体とエネルギーの双方に働きかける","desc":"レッドルチルクォーツは身体を温め、エネルギーレベルでも活性化させます。ブラッドストーンと相乗効果で子宝に恵まれるように働きます。"},{"id":"c169","category":"お守り","categoryEn":"GUARD","wish":"安産のお守り","pattern":1,"stones":[{"id":"chrysocolla","name":"クリソコラ"},{"id":"pink-opal","name":"ピンクオパール"}],"title":"女性が強く大きなエネルギーで母体を守る","desc":"出産時、母体と赤ちゃんを地球のエネルギーサイクルで守り、安全な出産のお守りとなる組み合わせ。とても優しい組み合わせといえます。"},{"id":"c170","category":"お守り","categoryEn":"GUARD","wish":"安産のお守り","pattern":2,"stones":[{"id":"red-agate","name":"レッドアゲート"},{"id":"treasure-agate","name":"トレジャーアゲート"}],"title":"母体のエネルギーを高めて安定させる","desc":"レッドアゲートが肉体面を、トレジャーアゲートがエネルギー面でのデトックスを行い、妊娠中の母体を良い状態に保ってくれます。"},{"id":"c171","category":"お守り","categoryEn":"GUARD","wish":"子育てのお守り","pattern":1,"stones":[{"id":"pink-opal","name":"ピンクオパール"},{"id":"kunzite","name":"クンツァイト"}],"title":"子育てで受ける心身のダメージを癒やす","desc":"子育て時の精神と肉体に対する負荷を軽減してくれる組み合わせです。クンツァイトがストレスを抜き、ピンクオパールがエネルギーを補います。"},{"id":"c172","category":"お守り","categoryEn":"GUARD","wish":"子育てのお守り","pattern":2,"stones":[{"id":"citrine","name":"シトリンクォーツ"},{"id":"kunzite","name":"クンツァイト"}],"title":"精神面をケアして癒やし効果をもたらす","desc":"子育てや介護において、自分以外の人間に対して愛を注ぐ状況で生まれるエネルギーの不全をきれいに流すようにサポートします。時に愛は自分自身への戒しを伴います。そんな時に頼りになる組み合わせがこちらです。"},{"id":"c173","category":"お守り","categoryEn":"GUARD","wish":"自分にとって良い環境を作るお守り","pattern":1,"stones":[{"id":"labradorite","name":"ラブラドライト"},{"id":"chrysocolla","name":"クリソコラ"}],"title":"人生の転機などもサポート","desc":"仕事や生活などトータルな面において自分にとって良い環境に近づけるように働く組み合わせです。転職のお守りとしても役立ちます。"},{"id":"c174","category":"お守り","categoryEn":"GUARD","wish":"自分にとって良い環境を作るお守り","pattern":2,"stones":[{"id":"larimar","name":"ラリマー"},{"id":"chrysocolla","name":"クリソコラ"}],"title":"仕事などのストレスを軽減する","desc":"住宅環境や仕事の際の環境的なストレスを軽減してくれる組み合わせです。仕事場での人間関係からのストレス緩和にも役立ちます。"},{"id":"c175","category":"お守り","categoryEn":"GUARD","wish":"人生の大事な局面でのお守り","pattern":1,"stones":[{"id":"garnet","name":"ガーネット"},{"id":"tanzanite","name":"タンザナイト"}],"title":"ターニングポイントで方向性を示す","desc":"人生の大切な局面で良い方向に進むことができるように導く組み合わせで、ガーネットが体力面も含めてタンザナイトと相乗的にサポートします。"},{"id":"c176","category":"お守り","categoryEn":"GUARD","wish":"人生の大事な局面でのお守り","pattern":2,"stones":[{"id":"labradorite","name":"ラブラドライト"},{"id":"tanzanite","name":"タンザナイト"}],"title":"人生の一大事に光を照らす","desc":"人生の大事やトラブルにおいて助けてくれる組み合わせ。魂の目的と進む道が合致した時に強い助けとなってくれます。"},{"id":"c177","category":"お守り","categoryEn":"GUARD","wish":"女性にとっての仕事のお守り","pattern":1,"stones":[{"id":"citrine","name":"シトリンクォーツ"},{"id":"pink-opal","name":"ピンクオパール"}],"title":"人気運アップやトラブル防止に","desc":"女性の接客業などにとても良いお守りとなってくれます。人気運が上がり、人間関係のトラブルなどから持ち主を守ってくれるでしょう。"},{"id":"c178","category":"お守り","categoryEn":"GUARD","wish":"女性にとっての仕事のお守り","pattern":2,"stones":[{"id":"pink-opal","name":"ピンクオパール"},{"id":"turquoise","name":"ターコイズ"}],"title":"仕事に関連したすべてのトラブルから身を守る","desc":"女性にとっての仕事全般のお守り、人間関係、霊的なもの、その他トラブルや災害などからのお守りです。"},{"id":"c179","category":"お守り","categoryEn":"GUARD","wish":"男性にとっての仕事のお守り","pattern":1,"stones":[{"id":"citrine","name":"シトリンクォーツ"},{"id":"turquoise","name":"ターコイズ"}],"title":"仕事関連のトラブルを防ぐ","desc":"男性にとっての仕事全般のお守り、災厄や危険、人間関係のトラブルなど含め、総合的にマイナスの影響から守ってくれる組み合わせです。"},{"id":"c180","category":"お守り","categoryEn":"GUARD","wish":"男性にとっての仕事のお守り","pattern":2,"stones":[{"id":"citrine","name":"シトリンクォーツ"},{"id":"tigers-eye","name":"タイガーアイ"}],"title":"正しい状況判断のサポートに","desc":"仕事において洞察力や判断力を高め、良い方向へ向かうように状況を読む助けとなる感知の石との組み合わせで力を発揮します。"},{"id":"c181","category":"才能開花・成長","categoryEn":"TALENT, GROWTH","wish":"才能を伸ばす","pattern":1,"stones":[{"id":"amazonite","name":"アマゾナイト"},{"id":"lapis-lazuli","name":"ラピスラズリ"}],"title":"感性とエネルギーに働いて能力を伸ばす","desc":"可能性を引き出し、能力を高める組み合わせです。感性とエネルギーの両面をサポートし、自分自身を信じることができるように促します。"},{"id":"c182","category":"才能開花・成長","categoryEn":"TALENT, GROWTH","wish":"才能を伸ばす","pattern":2,"stones":[{"id":"garnet","name":"ガーネット"},{"id":"milky-quartz","name":"ミルキークォーツ"}],"title":"秘められた才能を見つけ出して引き出す","desc":"今ある才能はもちろん、隠れた才能に光を当て、伸ばす組み合わせです。ガーネットが肉体に、ミルキークォーツが感性をサポートします。"},{"id":"c183","category":"才能開花・成長","categoryEn":"TALENT, GROWTH","wish":"才能を見つけやすくする","pattern":1,"stones":[{"id":"garnet","name":"ガーネット"},{"id":"carnelian","name":"カーネリアン"},{"id":"milky-quartz","name":"ミルキークォーツ"}],"title":"持ち主の才能を引き出す","desc":"面接やオーディションはもちろん、アーティストの夢を持っている方に特におすすめです。"},{"id":"c184","category":"才能開花・成長","categoryEn":"TALENT, GROWTH","wish":"才能を見つけやすくする","pattern":2,"stones":[{"id":"tiffany-stone","name":"ティファニーストーン"},{"id":"aragonite","name":"アラゴナイト"}],"title":"隠れた才能に気づかせてくれる","desc":"様々な出会いの場面を作り出し、自分でも気づいていない隠れた才能に気づく機会を与え、才能を伸ばすサポートとなる組み合わせです。"},{"id":"c185","category":"才能開花・成長","categoryEn":"TALENT, GROWTH","wish":"自己成長を促す","pattern":1,"stones":[{"id":"lapis-lazuli","name":"ラピスラズリ"},{"id":"onyx","name":"オニキス"}],"title":"堅実に、しかし確実に能力を伸ばす","desc":"浮つきを抑え、地に足を着けながら、人格や能力の成長をトータルでしっかりとサポートする組み合わせです。"},{"id":"c186","category":"才能開花・成長","categoryEn":"TALENT, GROWTH","wish":"自己成長を促す","pattern":2,"stones":[{"id":"jadeite","name":"翡翠"},{"id":"apatite","name":"アパタイト"}],"title":"「経験」をしっかりと「成長」へと繋げる","desc":"翡翠は五徳を高めるといわれ、自己成長のお守りとして有名です。アパタイトが加わることで、経験などの吸収と定着を高めます。"},{"id":"c187","category":"才能開花・成長","categoryEn":"TALENT, GROWTH","wish":"自立心を育てる","pattern":1,"stones":[{"id":"kyanite","name":"カイヤナイト"},{"id":"sapphire","name":"サファイア"}],"title":"意思と精神の核を強める","desc":"依存心を取り除き、自立しやすい環境を整えてくれる組み合わせ。カイヤナイトとサファイアは自立心を育てる上で障害になる「依存心」を取り除きます。"},{"id":"c188","category":"才能開花・成長","categoryEn":"TALENT, GROWTH","wish":"自立心を育てる","pattern":2,"stones":[{"id":"stibnite-in-quartz","name":"スティブナイトインクォーツ"},{"id":"spinel","name":"スピネル"}],"title":"折れない心を育てて問題解決へ導く","desc":"困難な状況に置かれても折れない心を育て、自分自身の力で問題を解決するカや聡明さ、インスピレーションを育んでくれる非常にエネルギーの強い組み合わせです。"},{"id":"c189","category":"その他","categoryEn":"OTHERS","wish":"セックスレスを解消する助け","pattern":1,"stones":[{"id":"carnelian","name":"カーネリアン"},{"id":"amethyst","name":"アメジスト"}],"title":"心身の魅力や欲求をコントロールする","desc":"肉体的な欲求や魅力を高めるカーネリアンと、精神的で、調和や調整を行うアメジスト。理性と欲求のバランスをとることによって、ただの欲望ではない愛に満ちた関係を築くサポートをします。"},{"id":"c190","category":"その他","categoryEn":"OTHERS","wish":"精力を高める","pattern":1,"stones":[{"id":"garnet","name":"ガーネット"},{"id":"carnelian","name":"カーネリアン"}],"title":"強力な精力増強作用を持つ","desc":"レッドのガーネットとカーネリアンは少々強力に欲望が強化される傾向にあるため、その面が緩和されているグリーンガーネットを併せてご紹介します。"},{"id":"c191","category":"その他","categoryEn":"OTHERS","wish":"精力を高める","pattern":2,"stones":[{"id":"green-garnet","name":"グリーンガーネット"},{"id":"carnelian","name":"カーネリアン"}],"title":"バランスよく精力を高めてくれる","desc":"精力を高めるのに非常にバランスがとれた組み合わせです。欲望的になり過ぎず、健全な精神と肉体をサポートします。"},{"id":"c192","category":"その他","categoryEn":"OTHERS","wish":"カルマの浄化を助ける","pattern":1,"stones":[{"id":"labradorite","name":"ラブラドライト"},{"id":"aquamarine","name":"アクアマリン"}],"title":"魂の情報を共鳴してカルマを浄化","desc":"ラブラドライトが魂の情報と共鳴し、アクアマリンがカルマを洗い、浄化してくれる組み合わせです。真の魂の目的に触れる組み合わせともいえます。"},{"id":"c193","category":"その他","categoryEn":"OTHERS","wish":"カルマの浄化を助ける","pattern":2,"stones":[{"id":"moldavite","name":"モルダバイト"},{"id":"tanzanite","name":"タンザナイト"}],"title":"前世からの課題をクリアする","desc":"前世から持ち越した課題やカルマを解決する強力な助けとなる組み合わせです。自分自身の進むべき方向を明確にしやすくしてくれます。"},{"id":"c194","category":"その他","categoryEn":"OTHERS","wish":"潜在的に抱えている問題を顕在化し、解決に導く","pattern":1,"stones":[{"id":"garden-quartz","name":"ガーデンクォーツ"},{"id":"obsidian","name":"オブシディアン"}],"title":"問題を顕在化させ、解決へと導く","desc":"力を急速に現実化したり、隠れている事物を顕在化したりする力を持つオブシディアンにプラスして、ガーデンクォーツが地に足を着け、問題に対処する助けとなる組み合わせです。"},{"id":"c195","category":"その他","categoryEn":"OTHERS","wish":"潜在的に抱えている問題を顕在化し、解決に導く","pattern":2,"stones":[{"id":"obsidian","name":"オブシディアン"},{"id":"labradorite","name":"ラブラドライト"},{"id":"moldavite","name":"モルダバイト"}],"title":"運命の変革に働きかける","desc":"問題を顕在化させ、解決へと導く力を持つ組み合わせです。ラブラドライトとモルダバイトは真に魂が進むべき道へと促してくれます。"},{"id":"c196","category":"その他","categoryEn":"OTHERS","wish":"人生における満足度を高める","pattern":1,"stones":[{"id":"jadeite","name":"翡翠"},{"id":"aventurine","name":"アベンチュリン"}],"title":"すべてのエネルギーバランスを調和する","desc":"肉体、精神、感情のバランスをとり、ストレスを軽減し、何気ない日々の事柄から幸せを感じる要素を強めてくれる組み合わせです。"},{"id":"c197","category":"その他","categoryEn":"OTHERS","wish":"人生における満足度を高める","pattern":2,"stones":[{"id":"amazonite","name":"アマゾナイト"},{"id":"chrysocolla","name":"クリソコラ"}],"title":"「幸せ」を呼び込むベースとなる","desc":"人生を楽しんだり、幸せを呼び込むためのベースとなる組み合わせです。アマゾナイトが幸運のエネルギーを引き寄せ、クリソコラが心身のバランスとリズムを整えます。"},{"id":"c198","category":"その他","categoryEn":"OTHERS","wish":"人生における満足度を高める","pattern":3,"stones":[{"id":"jadeite","name":"翡翠"},{"id":"pink-opal","name":"ピンクオパール"}],"title":"精神を穏やかにして安定させる","desc":"心の中から湧き上がってくる喜びや感動などの感情を高めてくれる組み合わせです。心身のバランスをとり、穏やかな精神状態に導くことで、心身の安定感が生まれます。"},{"id":"c199","category":"その他","categoryEn":"OTHERS","wish":"人生における満足度を高める","pattern":4,"stones":[{"id":"danburite","name":"ダンビュライト"},{"id":"opal","name":"オパール"}],"title":"組み合わせの相乗効果でエネルギーも高まる","desc":"それぞれ単体でもこのテーマに相応しいエネルギーを持つ石ですが、組み合わせる事でさらに効果が高まります。幸運を呼び込むエネルギーもとても強い組み合わせです。"}]}</script>
<script>
const DATA = JSON.parse(document.getElementById('stone-data').textContent);
const STONES = DATA.stones;
const COLORS = (DATA.meta && DATA.meta.colors) || DATA.colors || [];
const COMBOS = DATA.combinations || [];
const STONE_BY_ID = {};
STONES.forEach(s => STONE_BY_ID[s.id] = s);

const COLOR_MAP = {
  "白・無色":  {var:"--c-white",  ink:"--c-white-ink"},
  "紫":        {var:"--c-purple", ink:"--c-purple-ink"},
  "青・水色":  {var:"--c-blue",   ink:"--c-blue-ink"},
  "緑":        {var:"--c-green",  ink:"--c-green-ink"},
  "黄・オレンジ":{var:"--c-yellow", ink:"--c-yellow-ink"},
  "黒・茶色":  {var:"--c-black",  ink:"--c-black-ink"},
  "赤・ピンク":{var:"--c-red",    ink:"--c-red-ink"},
  "シルバー・グレー":{var:"--c-silver", ink:"--c-silver-ink"},
  "マルチカラー":{var:"--c-multi", ink:"--c-multi-ink"}
};

function colorVar(colorName){
  const m = COLOR_MAP[colorName];
  return m ? getComputedStyle(document.documentElement).getPropertyValue(m.var).trim() : "#c9a15a";
}

// gather all keywords with frequency
const kwFreq = {};
STONES.forEach(s => (s.tags||[]).forEach(t => kwFreq[t] = (kwFreq[t]||0)+1));
const topKeywords = Object.entries(kwFreq).sort((a,b)=>b[1]-a[1]).slice(0,16).map(x=>x[0]);

// combo categories, ordered by first appearance
const CATEGORIES = [...new Set(COMBOS.map(c => c.category))];

let state = { tab:'stones', query:"", color:null, keyword:null, category:null };

function renderChips(){
  const colorBtns = document.getElementById('colorButtons');
  const allActive = state.color===null ? ' active' : '';
  colorBtns.innerHTML = `<button class="color-btn all${allActive}" data-all-color="1">
      <span class="swatch-big"></span><span class="label">すべて</span>
    </button>` +
    COLORS.map(c => {
      const active = state.color===c ? ' active' : '';
      const count = STONES.filter(s=>s.color===c).length;
      return `<button class="color-btn${active}" data-color="${c}">
        <span class="swatch-big" style="background:${colorVar(c)}"></span>
        <span class="label">${c}<br>(${count})</span>
      </button>`;
    }).join('');

  const kwChips = document.getElementById('keywordChips');
  kwChips.innerHTML = '<div class="chip' + (state.keyword===null?' active':'') + '" data-all-kw="1">すべて</div>' +
    topKeywords.map(k => {
      const active = state.keyword===k ? ' active' : '';
      return `<div class="chip${active}" data-kw="${k}">${k}</div>`;
    }).join('');

  colorBtns.querySelectorAll('[data-color]').forEach(el=>{
    el.addEventListener('click', ()=>{ state.color = state.color===el.dataset.color ? null : el.dataset.color; renderChips(); renderGrid(); });
  });
  colorBtns.querySelector('[data-all-color]').addEventListener('click', ()=>{ state.color=null; renderChips(); renderGrid(); });
  kwChips.querySelectorAll('[data-kw]').forEach(el=>{
    el.addEventListener('click', ()=>{ state.keyword = state.keyword===el.dataset.kw ? null : el.dataset.kw; renderChips(); renderGrid(); });
  });
  kwChips.querySelector('[data-all-kw]').addEventListener('click', ()=>{ state.keyword=null; renderChips(); renderGrid(); });

  const catChips = document.getElementById('categoryChips');
  catChips.innerHTML = '<div class="chip' + (state.category===null?' active':'') + '" data-all-cat="1">すべて</div>' +
    CATEGORIES.map(cat => {
      const active = state.category===cat ? ' active' : '';
      const count = COMBOS.filter(c=>c.category===cat).length;
      return `<div class="chip${active}" data-cat="${cat}">${cat} (${count})</div>`;
    }).join('');
  catChips.querySelectorAll('[data-cat]').forEach(el=>{
    el.addEventListener('click', ()=>{ state.category = state.category===el.dataset.cat ? null : el.dataset.cat; renderChips(); renderCombos(); });
  });
  catChips.querySelector('[data-all-cat]').addEventListener('click', ()=>{ state.category=null; renderChips(); renderCombos(); });
}

function matchesQuery(stone, q){
  if(!q) return true;
  q = q.toLowerCase();
  const fields = [stone.name, stone.wamei, stone.en, stone.catch].filter(Boolean).join(' ').toLowerCase();
  return fields.includes(q);
}

function filteredStones(){
  return STONES.filter(s=>{
    if(state.color && s.color !== state.color) return false;
    if(state.keyword && !(s.tags||[]).includes(state.keyword)) return false;
    if(!matchesQuery(s, state.query)) return false;
    return true;
  });
}

function renderGrid(){
  const list = filteredStones();
  document.getElementById('countPill').textContent = list.length + '件';
  document.getElementById('resultSummary').innerHTML = state.color || state.keyword || state.query
    ? `<b>${list.length}</b> 件の石が見つかりました`
    : `全 <b>${STONES.length}</b> 石を収録`;

  const grid = document.getElementById('grid');
  const empty = document.getElementById('emptyState');
  if(list.length===0){
    grid.innerHTML = ''; empty.style.display='block'; return;
  }
  empty.style.display='none';
  grid.innerHTML = list.map(s=>{
    const c = colorVar(s.color);
    const kws = (s.tags||[]).slice(0,3).map(k=>`<span class="kw">${k}</span>`).join('');
    return `<div class="card" data-id="${s.id}">
      <div class="tag-bar" style="background:${c}"></div>
      <div class="name-row">
        <h3>${s.name}</h3>
      </div>
      <div class="en">${s.en||''}</div>
      <div class="catch">${s.catch || '<span class="empty-field">(解説準備中)</span>'}</div>
      <div class="keywords">${kws}</div>
    </div>`;
  }).join('');

  grid.querySelectorAll('.card').forEach(el=>{
    el.addEventListener('click', ()=> openDetail(el.dataset.id));
  });
}

function matchesComboQuery(combo, q){
  if(!q) return true;
  q = q.toLowerCase();
  const stoneNames = combo.stones.map(s=>s.name).join(' ');
  const fields = [combo.wish, combo.title, combo.desc, combo.category, stoneNames].filter(Boolean).join(' ').toLowerCase();
  return fields.includes(q);
}

function filteredCombos(){
  return COMBOS.filter(c=>{
    if(state.category && c.category !== state.category) return false;
    if(!matchesComboQuery(c, state.query)) return false;
    return true;
  });
}

function stoneChipHtml(s){
  const stone = s.id ? STONE_BY_ID[s.id] : null;
  if(!stone){
    return `<span class="combo-stone-chip plain">${s.name}</span>`;
  }
  const c = colorVar(stone.color);
  return `<span class="combo-stone-chip" data-stone-id="${stone.id}"><span class="dot" style="background:${c}"></span>${stone.name}</span>`;
}

function renderCombos(){
  const list = filteredCombos();
  document.getElementById('countPill').textContent = list.length + '件';
  document.getElementById('resultSummary').innerHTML = state.category || state.query
    ? `<b>${list.length}</b> 件の組み合わせが見つかりました`
    : `全 <b>${COMBOS.length}</b> 件の組み合わせを収録`;

  const comboList = document.getElementById('comboList');
  const empty = document.getElementById('emptyState');
  if(list.length===0){
    comboList.innerHTML = ''; empty.style.display='block'; return;
  }
  empty.style.display='none';

  let html = '';
  let lastWish = null;
  list.forEach(c=>{
    if(c.wish !== lastWish){
      html += `<div class="combo-group-header"><span class="cat-tag">${c.category}</span>${c.wish}</div>`;
      lastWish = c.wish;
    }
    const stonesHtml = c.stones.map((s,i)=> (i>0 ? '<span class="plus">+</span>' : '') + stoneChipHtml(s)).join('');
    html += `<div class="combo-card">
      <div class="pattern-num">Pattern ${c.pattern}</div>
      <div class="combo-stones">${stonesHtml}</div>
      <div class="combo-title">${c.title}</div>
      <div class="combo-desc">${c.desc}</div>
    </div>`;
  });
  comboList.innerHTML = html;

  comboList.querySelectorAll('[data-stone-id]').forEach(el=>{
    el.addEventListener('click', ()=> openDetail(el.dataset.stoneId));
  });
}

function switchTab(tab){
  state.tab = tab;
  document.getElementById('tabStones').classList.toggle('active', tab==='stones');
  document.getElementById('tabCombos').classList.toggle('active', tab==='combos');
  document.getElementById('stoneFilterGroup1').style.display = tab==='stones' ? '' : 'none';
  document.getElementById('stoneFilterGroup2').style.display = tab==='stones' ? '' : 'none';
  document.getElementById('comboFilterGroup').style.display = tab==='combos' ? '' : 'none';
  document.getElementById('grid').style.display = tab==='stones' ? '' : 'none';
  document.getElementById('comboList').style.display = tab==='combos' ? '' : 'none';
  document.getElementById('searchInput').placeholder = tab==='stones'
    ? '石の名前で検索(例: ムーン、アメ、水晶)'
    : '悩み・願い、石の名前で検索(例: 恋愛、金運)';
  document.getElementById('emptyState').style.display = 'none';
  if(tab==='stones'){ renderGrid(); } else { renderCombos(); }
}

document.getElementById('tabStones').addEventListener('click', ()=> switchTab('stones'));
document.getElementById('tabCombos').addEventListener('click', ()=> switchTab('combos'));

function openDetail(id){
  const s = STONES.find(x=>x.id===id);
  if(!s) return;
  const c = colorVar(s.color);

  const dataRows = [
    ['主な原産国', s.origin],
    ['硬度', s.hard],
    ['成分', s.comp],
    ['結晶系', s.crystal],
    ['比重', s.sg],
    ['代表的な処理', s.treat],
  ].filter(r => r[1]);

  const energyHtml = (s.energy && s.energy.length)
    ? `<div class="energy-list">${s.energy.map(e=>`<div class="energy-item"><span class="bullet" style="background:${c}"></span>${e}</div>`).join('')}</div>`
    : `<div class="section-text empty-field">(準備中)</div>`;

  const kwHtml = (s.tags||[]).map(k=>`<span class="kw-pill">${k}</span>`).join('');

  const cautionHtml = s.caution ? `<div class="caution-box"><b>取り扱いの注意:</b> ${s.caution}</div>` : '';

  const relatedCombos = (s.combos||[]).map(cid => COMBOS.find(c=>c.id===cid)).filter(Boolean);
  const combosHtml = relatedCombos.length ? `
    <div class="section-title">こんな組み合わせにも</div>
    ${relatedCombos.map(rc => {
      const partners = rc.stones.filter(st => st.id !== s.id);
      const partnerChips = partners.map(p => {
        const pStone = p.id ? STONE_BY_ID[p.id] : null;
        return pStone
          ? `<span class="partner-chip" data-stone-id="${pStone.id}">${pStone.name}</span>`
          : `<span class="partner-chip" style="cursor:default;opacity:0.7;">${p.name}</span>`;
      }).join('');
      return `<div class="related-combo-item">
        <div class="wish">${rc.category} ・ ${rc.wish}</div>
        <div class="title">${rc.title}</div>
        <div class="partners">${partnerChips}</div>
      </div>`;
    }).join('')}
  ` : '';

  document.getElementById('detailPanel').innerHTML = `
    <div class="detail-hero">
      <div class="detail-close" id="closeBtn">&times;</div>
      <div class="detail-eyebrow" style="color:${c}"><span class="dot" style="background:${c}"></span>${s.color}${s.type && s.type!=='main' ? ' ・ ' + s.type : ''}</div>
      <h2>${s.name}</h2>
      <div class="en-name">${s.en || ''}</div>
      ${s.wamei ? `<div class="wamei">和名: ${s.wamei}</div>` : ''}
      ${s.catch ? `<div class="catch-line">${s.catch}</div>` : ''}
    </div>
    <div class="detail-body">
      ${kwHtml ? `<div class="section-title">Keyword</div><div class="kw-row">${kwHtml}</div>` : ''}

      <div class="section-title">特徴</div>
      <div class="section-text">${s.feat || '<span class="empty-field">(準備中)</span>'}</div>

      <div class="section-title">パワー</div>
      <div class="section-text">${s.power || '<span class="empty-field">(準備中)</span>'}</div>

      <div class="section-title">エネルギーの特性</div>
      ${energyHtml}

      ${combosHtml}

      ${dataRows.length ? `<div class="section-title">Data</div>
      <table class="data-table">${dataRows.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('')}</table>` : ''}
      ${cautionHtml}
    </div>
  `;
  document.getElementById('closeBtn').addEventListener('click', closeDetail);
  document.getElementById('detailPanel').querySelectorAll('[data-stone-id]').forEach(el=>{
    el.addEventListener('click', ()=> openDetail(el.dataset.stoneId));
  });
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
  document.getElementById('detailPanel').scrollTop = 0;
  window.scrollTo(0,0);
}

function closeDetail(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
}

document.getElementById('overlay').addEventListener('click', (e)=>{
  if(e.target.id==='overlay') closeDetail();
});
document.addEventListener('keydown', (e)=>{
  if(e.key==='Escape') closeDetail();
});

document.getElementById('searchInput').addEventListener('input', (e)=>{
  state.query = e.target.value.trim();
  if(state.tab==='stones'){ renderGrid(); } else { renderCombos(); }
});

// "絞り込みへ" button: filters live as normal content at the top of the page
// (they scroll away naturally, no JS-driven height animation -> no flicker).
// This button just smooth-scrolls back up to them.
const filterToggle = document.getElementById('filterToggle');
const filtersSection = document.getElementById('filtersSection');

filterToggle.addEventListener('click', ()=>{
  if(filtersSection.scrollIntoView){
    filtersSection.scrollIntoView({ behavior:'smooth', block:'start' });
  } else {
    window.scrollTo(0,0);
  }
});

renderChips();
renderGrid();
</script>
</body>
</html>
